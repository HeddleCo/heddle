name: Formal Specifications

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches: [main]

jobs:
  # Tier 1: Fast random simulation on every PR (~30s)
  quint-simulate:
    name: Quint Simulation (10K traces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm install -g @informalsystems/quint

      - name: Simulate all specs
        run: |
          failed=0
          for spec in specs/quint/*.qnt; do
            name="$(basename "$spec")"
            [ "$name" = "common.qnt" ] && continue
            echo "::group::$name"
            if ! quint run --max-samples=10000 --max-steps=20 --invariant=safety "$spec"; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  # Tier 2: Thorough simulation on merge to main only
  quint-thorough:
    name: Quint Thorough Simulation (500K traces)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm install -g @informalsystems/quint

      - name: Simulate all specs (500K traces, 50 steps)
        run: |
          failed=0
          for spec in specs/quint/*.qnt; do
            name="$(basename "$spec")"
            [ "$name" = "common.qnt" ] && continue
            echo "::group::$name"
            if ! quint run --max-samples=500000 --max-steps=50 --invariant=safety "$spec"; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  # Tier 3: Rust property tests
  proptest:
    name: Property Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run formal spec property tests
        run: cargo test --test formal_specs
        env:
          PROPTEST_CASES: 10000
