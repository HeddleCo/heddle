name: Supply-chain audit

# Blocking gate for the Rust supply chain.
#
# - cargo-deny enforces the policy in deny.toml (licenses, banned crates,
#   advisories, registry/git sources).
# - cargo-audit cross-checks the RustSec advisory DB on main/schedule/manual.
#   cargo-deny already reads the same DB, so it remains the PR gate while
#   cargo-audit gives us a second tool's take outside the hot PR path.
#
# The weekly cron catches advisories filed against unchanged dependencies
# (a new CVE against a crate we already ship will trip the gate on Monday
# even if no one has pushed code).

on:
  # cargo-deny runs on every PR (no paths filter). If we limited to Cargo*/deny.toml
  # changes and this workflow is set as a Required check, GitHub leaves the
  # required-but-skipped run pending forever for PRs that don't touch those
  # files, blocking merge. Always-run keeps the gate workable as a Required
  # check; cargo-audit is scheduled/main/manual only below.
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly: Mondays 05:17 UTC. Offset minute avoids the top-of-the-hour
    # GitHub-Actions scheduling stampede.
    - cron: '17 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # `check all` runs advisories + bans + licenses + sources in one pass.
          command: check all
          # Pin a modern toolchain explicitly. The action's default falls
          # back to Rust 1.71, but this workspace is `edition = "2024"`
          # (workspace Cargo.toml), which requires Rust 1.85+. Without
          # this, cargo-deny errors out before policy checks run.
          rust-version: stable

  cli-dep-count:
    name: cli transitive dep count (heddle#604)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # Guards the heddle-cli transitive-dependency closure against silent
      # regrowth after the gix removal (IMPROVEMENT_PLAN section 8 / P4 cut a
      # ~277-dep subtree). Pure `cargo metadata` — no crate build — so it
      # stays cheap on the PR path. Fails if the live count exceeds the
      # committed baseline + slack; raise the baseline JSON in the same PR for
      # an intentional addition.
      - name: Assert CLI transitive dep count within baseline
        run: bash scripts/check-cli-dep-count.sh

  cargo-audit:
    name: cargo-audit
    if: github.event_name != 'pull_request'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        # --deny warnings escalates yanked / unmaintained / notice advisories
        # to errors. The ignore list lives in .cargo/audit.toml (auto-
        # discovered by cargo-audit). That file mirrors deny.toml's
        # [advisories].ignore — cargo-audit doesn't read deny.toml directly.
        # To accept a new advisory: add it to BOTH deny.toml and audit.toml
        # with matching rationale, and update CONTRIBUTING's Security section.
        run: cargo audit --deny warnings
