name: Release binaries

# Pre-built binaries for the `heddle` CLI on tagged releases.
#
# Trigger: stable-semver tag push (vX.Y.Z) OR manual workflow_dispatch
# with an existing tag (used for RC dry-runs). The job tree:
#
#   validate-tag ──► build (matrix, 5 CLI targets) ──┐
#              └──► build-macos-cask ────────────────┤
#                                                    ├─► sign + checksum
#                                                    ├─► release (aggregates, publishes, posts SHA256SUMS)
#                                                    └─► publish-manifests (stable only)
#
# validate-tag is the single trust gate for the pipeline. It refuses to
# proceed unless the requested tag (a) exists, (b) is reachable from
# origin/main, and (c) matches the documented release-tag pattern. All
# downstream jobs read the validated tag and the publish "kind"
# (stable | prerelease) from its outputs — no other job should look at
# the raw trigger ref. This keeps the answer to "is this a sanctioned
# release?" in exactly one place.
#
# Strategy: one build-matrix leg per target. Rationale lives in
# RELEASING.md — short version: Linux keeps a pinned glibc floor,
# Windows stays on an MSVC host, and macOS legs run on macos-26 so
# every Apple artifact compiles against the same FSKit SDK floor.
#
# Signing: cosign keyless via the Sigstore public-good instance. No
# stored secrets — the GitHub OIDC token is the trust anchor. Verifying
# parties run `cosign verify-blob --certificate-identity-regexp ...`;
# see RELEASING.md for the exact recipe.

on:
  push:
    # Strict semver only. RC / beta / alpha tags do not auto-trigger; use
    # workflow_dispatch for dry-runs so the publish step can mark them
    # prerelease+draft. See validate-tag for the full rule.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (vX.Y.Z or vX.Y.Z-(rc|alpha|beta)[.N]). Dispatch-triggered runs always publish as prerelease+draft.'
        required: true

permissions:
  contents: write   # create release + upload assets
  id-token: write   # cosign keyless OIDC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: heddle
  CRATE_NAME: heddle-cli

jobs:
  validate-tag:
    name: validate tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.classify.outputs.tag }}
      # The validated commit SHA. Downstream jobs MUST check out this
      # SHA, not refs/tags/<tag> — see TOCTOU note in the classify step.
      tag_sha: ${{ steps.classify.outputs.tag_sha }}
      kind: ${{ steps.classify.outputs.kind }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed for both the tag→commit resolution and
          # the ancestor check against origin/main.
          fetch-depth: 0

      - name: Resolve, verify, and classify tag
        id: classify
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          PUSH_REF: ${{ github.ref }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          # 1. Resolve the requested tag from the trigger.
          case "$EVENT" in
            push)
              if [[ "$PUSH_REF" != refs/tags/* ]]; then
                echo "::error::push trigger but ref is not a tag: $PUSH_REF"
                exit 1
              fi
              tag="${PUSH_REF#refs/tags/}"
              ;;
            workflow_dispatch)
              tag="$DISPATCH_TAG"
              ;;
            *)
              echo "::error::unsupported event: $EVENT"
              exit 1
              ;;
          esac

          if [[ -z "$tag" ]]; then
            echo "::error::no tag resolved from trigger ($EVENT)"
            exit 1
          fi

          # 2. Reject anything that is not a real tag in this repo. This
          #    catches workflow_dispatch with 'main', a typo, or a
          #    deleted tag — none of which should reach the build job.
          if ! git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "::error::'${tag}' is not a tag in this repository"
            exit 1
          fi

          # 3. The pipeline only ships releases from main. A tag pointed
          #    at a feature branch (deliberately or accidentally) must
          #    not produce signed binaries with the heddle release OIDC
          #    identity. The tag-push trigger does not enforce branch
          #    ancestry on its own, so we do it here.
          tag_sha="$(git rev-parse "refs/tags/${tag}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_sha" "refs/remotes/origin/main"; then
            echo "::error::tag '${tag}' (commit ${tag_sha}) is not reachable from origin/main — refusing to release"
            exit 1
          fi

          # 4. Classify. Tag pattern decides the *shape* of release;
          #    event source decides whether it ships as a final release.
          #    Dispatch runs are *always* prerelease+draft so an operator
          #    dry-run cannot accidentally publish a public, non-draft
          #    release — even if they hand-type a stable-looking tag.
          # SemVer prerelease identifiers permit both `-rc.1` (dot-
          # separated) and `-rc1` (concatenated) shapes; accept either.
          stable_re='^v[0-9]+\.[0-9]+\.[0-9]+$'
          pre_re='^v[0-9]+\.[0-9]+\.[0-9]+-(rc|alpha|beta)(\.?[0-9]+)?$'

          if ! [[ "$tag" =~ $stable_re || "$tag" =~ $pre_re ]]; then
            echo "::error::tag '${tag}' does not match vX.Y.Z or vX.Y.Z-(rc|alpha|beta)[.N]"
            exit 1
          fi

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            # Dispatch is the RC/dry-run path. Stable tags MUST go through
            # the push trigger so they cannot be retroactively downgraded:
            # softprops/action-gh-release UPDATES an existing release when
            # tag_name already exists, and dispatch always sets
            # kind=prerelease+draft. Without this guard, an operator (or
            # an attacker with workflow-dispatch rights) could re-dispatch
            # a previously-published vX.Y.Z and silently mark the public
            # release as prerelease+draft. Refuse loudly.
            if [[ "$tag" =~ $stable_re ]]; then
              echo "::error::workflow_dispatch refuses stable tag '${tag}'. Stable releases (vX.Y.Z) must go through the push trigger; dispatch is for prerelease dry-runs only (vX.Y.Z-(rc|alpha|beta)[.N]). See RELEASING.md."
              exit 1
            fi
            kind=prerelease
          elif [[ "$tag" =~ $stable_re ]]; then
            kind=stable
          else
            # Push trigger but the tag is not strict semver. The push
            # filter should have blocked this; if it slipped through,
            # fail loudly rather than silently downgrading.
            echo "::error::push trigger received non-stable tag '${tag}'; refusing"
            exit 1
          fi

          # tag_sha is the only ref downstream jobs are allowed to act on.
          # Emitting it as an output (rather than re-resolving the tag in
          # each downstream job) closes the TOCTOU window: if the tag is
          # force-moved AFTER validate-tag passes but BEFORE build/release
          # check it out, those jobs would otherwise operate on the
          # attacker-controlled commit. Pinning to the SHA we just
          # ancestor-checked means every step works on the same commit.
          echo "Resolved: tag=${tag} commit=${tag_sha} kind=${kind}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${tag_sha}" >> "$GITHUB_OUTPUT"
          echo "kind=${kind}" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: validate-tag
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-26
            archive: tar.gz
          - target: x86_64-apple-darwin
            # Keep standalone CLI tarballs on the same macOS 26 image
            # as the cask builder so FSKit's SDK/deployment floor never
            # splits across release artifacts.
            runner: macos-26
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            # glibc floor: ubuntu-22.04 ships glibc 2.35, so the -gnu
            # binaries run on Debian 12 (2.36) and Ubuntu 22.04+ forward.
            # Building on ubuntu-24.04 (glibc 2.39) crashed at runtime on
            # those targets with GLIBC_2.3x-not-found (#549).
            runner: ubuntu-22.04-arm
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
          # aarch64-pc-windows-msvc is parked: the binary builds fine, but
          # sigstore/cosign-installer@v3 ships no Windows-arm64 asset, so the
          # signing step hard-fails (observed on the v0.3.0-rc.1 dry-run).
          # Unsigned artifacts in an otherwise-signed release are worse than
          # absence. Re-add when cosign ships win-arm64 binaries — tracked in
          # the "re-enable aarch64-pc-windows-msvc" issue.
    steps:
      - uses: actions/checkout@v4
        with:
          # Pin to the SHA validate-tag verified, not the tag ref. If the
          # tag is force-moved between validate-tag and this step, we
          # still build the commit that passed the trust check. The
          # cosign signature is therefore over an artifact derived from a
          # known-ancestor commit, not from whatever the tag currently
          # points at.
          ref: ${{ needs.validate-tag.outputs.tag_sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Compute version
        id: ver
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          # Strip leading "v" if present (v0.3.0 → 0.3.0).
          version="${TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --locked -p ${{ env.CRATE_NAME }} --features mount --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage="heddle-${{ steps.ver.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${stage}/"
          cp README.md LICENSE NOTICE "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "ASSET=dist/${stage}.tar.gz" >> "$GITHUB_ENV"
          echo "SUM=dist/${stage}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Stage artifact (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "heddle-${{ steps.ver.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "dist/$stage/"
          Copy-Item README.md, LICENSE, NOTICE "dist/$stage/"
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$stage.zip").Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"
          "ASSET=dist/$stage.zip"        | Out-File -Encoding ascii -Append $env:GITHUB_ENV
          "SUM=dist/$stage.zip.sha256"   | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact (cosign keyless)
        shell: bash
        run: |
          set -euo pipefail
          # Keyless signing: identity is this workflow run's OIDC token,
          # rooted in the Sigstore public-good Fulcio CA. The .sig and
          # .pem land next to the artifact for offline verification.
          cosign sign-blob --yes \
            --output-signature "${ASSET}.sig" \
            --output-certificate "${ASSET}.pem" \
            "${ASSET}"

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: heddle-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.SUM }}
            ${{ env.ASSET }}.sig
            ${{ env.ASSET }}.pem
          if-no-files-found: error
          retention-days: 7

  build-macos-cask:
    name: build macOS cask artifact
    needs: validate-tag
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          # Same SHA pin as the CLI build job — see comment there.
          ref: ${{ needs.validate-tag.outputs.tag_sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-cask
          cache-on-failure: true

      - name: Compute version
        id: ver
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID Application certificate
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.HEDDLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.HEDDLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CERTIFICATE_BASE64:?missing HEDDLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64}"
          : "${CERTIFICATE_PASSWORD:?missing HEDDLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}"

          keychain_password="$(uuidgen)"
          keychain_path="$RUNNER_TEMP/heddle-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Install FSKit provisioning profiles
        shell: bash
        env:
          HOST_PROFILE_BASE64: ${{ secrets.HEDDLE_HOST_PROVISION_PROFILE_BASE64 }}
          FSMODULE_PROFILE_BASE64: ${{ secrets.HEDDLE_FSMODULE_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          : "${HOST_PROFILE_BASE64:?missing HEDDLE_HOST_PROVISION_PROFILE_BASE64}"
          : "${FSMODULE_PROFILE_BASE64:?missing HEDDLE_FSMODULE_PROVISION_PROFILE_BASE64}"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          host_profile="$RUNNER_TEMP/HeddleHost.provisionprofile"
          fsmodule_profile="$RUNNER_TEMP/HeddleFSModule.provisionprofile"
          echo "$HOST_PROFILE_BASE64" | base64 --decode > "$host_profile"
          echo "$FSMODULE_PROFILE_BASE64" | base64 --decode > "$fsmodule_profile"

          cp "$host_profile" "$HOME/Library/MobileDevice/Provisioning Profiles/HeddleHost.provisionprofile"
          cp "$fsmodule_profile" "$HOME/Library/MobileDevice/Provisioning Profiles/HeddleFSModule.provisionprofile"

          echo "HEDDLE_HOST_PROVISION_PROFILE=$host_profile" >> "$GITHUB_ENV"
          echo "HEDDLE_FSMODULE_PROVISION_PROFILE=$fsmodule_profile" >> "$GITHUB_ENV"

      - name: Write App Store Connect notary key
        shell: bash
        env:
          NOTARY_PRIVATE_KEY: ${{ secrets.HEDDLE_NOTARY_PRIVATE_KEY }}
          NOTARY_KEY_ID: ${{ secrets.HEDDLE_NOTARY_KEY_ID }}
        run: |
          set -euo pipefail
          : "${NOTARY_PRIVATE_KEY:?missing HEDDLE_NOTARY_PRIVATE_KEY}"
          : "${NOTARY_KEY_ID:?missing HEDDLE_NOTARY_KEY_ID}"

          key_path="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          printf '%s' "$NOTARY_PRIVATE_KEY" | perl -pe 's/\\n/\n/g' > "$key_path"
          chmod 0600 "$key_path"
          echo "HEDDLE_NOTARY_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and package Heddle.app
        shell: bash
        env:
          HEDDLE_TAG: ${{ needs.validate-tag.outputs.tag }}
          HEDDLE_VERSION: ${{ steps.ver.outputs.version }}
          HEDDLE_TEAM_ID: ${{ vars.HEDDLE_TEAM_ID || '33V6242M8S' }}
          HEDDLE_DEVELOPER_ID: ${{ vars.HEDDLE_DEVELOPER_ID_APPLICATION }}
          HEDDLE_NOTARY_KEY_ID: ${{ secrets.HEDDLE_NOTARY_KEY_ID }}
          HEDDLE_NOTARY_ISSUER_ID: ${{ secrets.HEDDLE_NOTARY_ISSUER_ID }}
        run: scripts/build-macos-cask-artifact.sh

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign macOS cask artifact (cosign keyless)
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          asset="dist/Heddle-${TAG}-macos-universal.dmg"
          cosign sign-blob --yes \
            --output-signature "${asset}.sig" \
            --output-certificate "${asset}.pem" \
            "$asset"

      - name: Upload macOS cask outputs
        uses: actions/upload-artifact@v4
        with:
          name: heddle-macos-cask
          path: |
            dist/Heddle-${{ needs.validate-tag.outputs.tag }}-macos-universal.dmg
            dist/Heddle-${{ needs.validate-tag.outputs.tag }}-macos-universal.dmg.sha256
            dist/Heddle-${{ needs.validate-tag.outputs.tag }}-macos-universal.dmg.sig
            dist/Heddle-${{ needs.validate-tag.outputs.tag }}-macos-universal.dmg.pem
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [validate-tag, build, build-macos-cask]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Same SHA pin as the build job — see comment there.
          ref: ${{ needs.validate-tag.outputs.tag_sha }}

      - name: Download all build outputs
        uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Flatten + aggregate SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p dist
          find staging -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o -name '*.sig' -o -name '*.pem' -o -name '*.sha256' \) \
            -exec cp -t dist {} +
          ( cd dist && cat *.sha256 | sort > SHA256SUMS )
          echo "--- artifacts ---"
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: ${{ needs.validate-tag.outputs.tag }}
          # Dispatch-triggered runs (and any future non-stable trigger
          # path) publish as draft + prerelease. Push-triggered stable
          # releases publish as a normal release.
          draft: ${{ needs.validate-tag.outputs.kind != 'stable' }}
          prerelease: ${{ needs.validate-tag.outputs.kind != 'stable' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/heddle-*.tar.gz
            dist/heddle-*.tar.gz.sha256
            dist/heddle-*.tar.gz.sig
            dist/heddle-*.tar.gz.pem
            dist/heddle-*.zip
            dist/heddle-*.zip.sha256
            dist/heddle-*.zip.sig
            dist/heddle-*.zip.pem
            dist/Heddle-*.dmg
            dist/Heddle-*.dmg.sha256
            dist/Heddle-*.dmg.sig
            dist/Heddle-*.dmg.pem
            dist/SHA256SUMS

  publish-manifests:
    name: publish package manifests
    needs: [validate-tag, build, build-macos-cask, release]
    if: needs.validate-tag.outputs.kind == 'stable'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Render manifests from the exact commit that produced the release.
          ref: ${{ needs.validate-tag.outputs.tag_sha }}

      - name: Download release build outputs
        uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Flatten + aggregate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist rendered
          find staging -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o -name '*.sha256' \) \
            -exec cp -t dist {} +
          ( cd dist && cat *.sha256 | sort > SHA256SUMS )

      - name: Compute manifest inputs
        id: ver
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Render Homebrew cask
        shell: bash
        run: scripts/render-homebrew-cask.sh "${{ steps.ver.outputs.tag }}" dist/SHA256SUMS rendered/heddle.rb

      - name: Generate release publisher token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HEDDLE_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEDDLE_RELEASE_APP_PRIVATE_KEY }}
          owner: HeddleCo
          repositories: homebrew-heddle

      - name: Publish Homebrew cask PR
        uses: ./.github/actions/publish-manifest
        with:
          target-repo: HeddleCo/homebrew-heddle
          manifest-path: Casks/heddle.rb
          rendered-file: rendered/heddle.rb
          token: ${{ steps.app-token.outputs.token }}
          channel: homebrew
          version: ${{ steps.ver.outputs.version }}
