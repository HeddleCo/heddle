name: Release pipeline check

# Static asserters for the two release pipelines and the
# silent-corruption invariant:
#   - binary release (heddle#56) — release.yml fires on `v*` tag push
#   - crates.io publish (heddle#72) — publish-crates.yml fires on push
#     to main
#   - silent-default tree load (heddle#90 + heddle#93) — the bug class
#     where `get_tree(...)?.unwrap_or_default()` silently substituted
#     `Tree::default()` for a missing subtree, masking store corruption
#     as empty content / silent erase / silent no-op
#
# These pipelines and patterns run only on their respective triggers
# (or get hit only when grep finds something), so this job is what
# gives normal PRs a signal that all three contracts are intact.
# Parallel jobs so a regression in one doesn't silence the others.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-pipeline-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-contract:
    name: release.yml contract
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Assert release pipeline contract
        run: bash scripts/check-release-pipeline.sh

  publish-contract:
    name: publish-crates.yml contract
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Assert publish pipeline contract
        run: bash scripts/check-publish-pipeline.sh

  rust-ast-invariants:
    name: Rust AST invariant checks
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The asserters are Rust binaries (heddle-devtools subcommands) using
      # `syn` to walk the AST. Build once, then run every AST-backed invariant
      # check so PRs do not pay for duplicate toolchain/cache setup.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: asserter-${{ runner.os }}
          cache-on-failure: true

      - name: Build asserter binary
        run: cargo build -p heddle-devtools --quiet

      # Silent-default tree load (heddle#90 + heddle#93): reject the bug
      # class where `get_tree(...)?.unwrap_or_default()` silently substituted
      # `Tree::default()` for a missing subtree, masking store corruption as
      # empty content / silent erase / silent no-op. The mutation tests run
      # first so a future edit that defeats the asserter fails before the
      # asserter has a chance to silently pass on production code.
      - name: Silent-default tree-load asserter self-tests
        run: bash scripts/test-check-no-silent-default-tree-load.sh

      - name: Assert no silent-default tree-load regressions
        run: bash scripts/check-no-silent-default-tree-load.sh

      # Cross-crate publish-first snapshot (heddle#354 r8): a snapshot must
      # record its `OpRecord::Snapshot` before publishing the paired ref.
      # Closes the cross-crate coverage hole the refs-internal r7 conformance
      # left.
      - name: Assert no cross-crate publish-first snapshot regressions
        run: bash scripts/check-snapshot-atomicity.sh

      # Track A verification ownership: health/state proof construction lives
      # in heddle-core only. CLI may inject Machine-Contract Proof + render.
      - name: Assert verification proof ownership stays in heddle-core
        run: bash scripts/check-verification-owner.sh

  authored-states-signed:
    name: authored states sign via chokepoint (heddle#482)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      # Pure-bash grep guard: a new authored-state writer under the CLI
      # command tree must route through Repository::put_authored_state
      # (auto-signs), never store().put_state directly. Closes the
      # signing coverage-leak class (heddle#482 r2).
      - name: Assert no authored-state signing-chokepoint bypasses
        run: bash scripts/check-authored-states-signed.sh
