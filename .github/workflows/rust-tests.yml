name: Rust Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: rust-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      - name: Clippy (all features)
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (heddle-cli minimal features)
        run: cargo clippy --locked -p cli --all-targets --no-default-features --features local -- -D warnings

  test-minimal:
    name: Tests (minimal features)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      - name: Run heddle-cli tests (minimal features)
        run: cargo test --locked -p cli --no-default-features --features local

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      - name: Generate coverage report
        run: cargo llvm-cov --locked --workspace --all-features --lcov --output-path lcov.info

      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only | tee coverage-summary.txt

      - name: Generate HTML coverage report
        run: cargo llvm-cov report --html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
          verbose: true

      - name: Publish coverage summary
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html
          if-no-files-found: error

      - name: Show sccache stats
        run: sccache --show-stats

  postgres-integration:
    name: Postgres Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: heddle_ci
          POSTGRES_USER: heddle
          POSTGRES_PASSWORD: heddle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heddle -d heddle_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://heddle:heddle@127.0.0.1:5432/heddle_ci
      HEDDLE_TEST_DATABASE_URL: postgres://heddle:heddle@127.0.0.1:5432/heddle_ci
      HEDDLE_SERVER_DATABASE_URL: postgres://heddle:heddle@127.0.0.1:5432/heddle_ci

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Enable pgcrypto
        env:
          PGPASSWORD: heddle
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;'

      - name: Run Postgres-backed registry integration tests
        run: cargo test --locked -p cli --features hosted-client --test pg_hosted_registry_integration --test grpc_hosted_integration --test cli_hosted_grpc_integration -- --ignored --test-threads=1

      - name: Show sccache stats
        run: sccache --show-stats
