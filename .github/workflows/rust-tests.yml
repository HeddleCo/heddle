name: Rust Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: rust-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      # `--all-features` would enable `heddle-cli/weft-client`, which is
      # designed to be patched in from the closed HeddleCo/weft workspace
      # via [patch.crates-io]. From OSS it would resolve to the 0.0.0
      # reservation stub and fail to compile. Clippy across the practical
      # OSS feature set instead.
      - name: Clippy (OSS features)
        run: cargo clippy --locked --workspace --all-targets --features git-overlay,native,semantic,zstd -- -D warnings

      - name: Clippy (heddle-cli minimal features)
        run: cargo clippy --locked -p heddle-cli --all-targets --no-default-features --features git-overlay,local -- -D warnings

  test-minimal:
    name: Tests (minimal features)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      - name: Run heddle-cli tests (minimal features)
        run: cargo test --locked -p heddle-cli --no-default-features --features git-overlay,local

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      # `--all-features` would enable `heddle-cli/weft-client`, which
      # only resolves to the closed weft-client crate via the [patch.crates-io]
      # in HeddleCo/weft. From the OSS workspace the dep resolves to the
      # 0.0.0 reservation stub which intentionally has no impls.
      # Run coverage against the OSS feature set instead.
      - name: Generate coverage report
        run: cargo llvm-cov --locked --workspace --features git-overlay,native,semantic,zstd --lcov --output-path lcov.info

      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only | tee coverage-summary.txt

      - name: Generate HTML coverage report
        run: cargo llvm-cov report --html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
          verbose: true

      - name: Publish coverage summary
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html
          if-no-files-found: error

      - name: Show sccache stats
        run: sccache --show-stats

  # Note: the closed Postgres-backed integration tests
  # (pg_hosted_registry_integration, grpc_hosted_integration,
  # cli_hosted_grpc_integration) live in the HeddleCo/weft workspace
  # and run from CI there. They're not part of the OSS surface.
