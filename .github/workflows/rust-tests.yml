name: Rust Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly coverage gate: Sundays 06:00 UTC. Offset from the full
    # Criterion benchmark workflow so the heavy lanes don't stampede.
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: rust-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Run every `run:` step under `bash --noprofile --norc -eo pipefail`
# instead of the default `bash -e`. Without `pipefail`, a non-zero
# exit from any command piped into `tee` is masked by `tee`'s success
# — which is exactly how the `cargo bench | tee` and
# `fuse-bench-compare.py | tee` steps could silently pass on real
# failures before this was set. Codex r1 on heddle#89 flagged both.
defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  # sccache caches to LOCAL DISK, not the GitHub Actions (Azure-backed) cache.
  # The Blacksmith self-hosted runners can't DNS-resolve the GHA cache's Azure
  # blob backend, so SCCACHE_GHA_ENABLED=true hard-fails the job (exit 74) at
  # sccache startup/stats. Cross-run target/ caching still comes from
  # Swatinem/rust-cache, which Blacksmith transparently accelerates.
  SCCACHE_GHA_ENABLED: "false"

jobs:
  facade-render-free:
    name: Facade render-free
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Check facade/domain crates
        run: bash scripts/check-facade-render-free.sh

  # Path gate for the heavy Rust jobs. PRs diff against the base branch and
  # pushes diff against the pre-push SHA. Any uncertainty falls back to running
  # the full matrix. Most of the CI bill on this repo is doc/spike PRs (often
  # several Codex rounds) re-running the full matrix per round.
  #
  # Outputs:
  #   docs_only — every changed path is doc-only (see below); skip all Rust.
  #   release_only — every changed path is release/publish workflow plumbing.
  #   rust      — !docs_only && !release_only; gates quality / compile contracts / postgres / CLI fault-injection.
  #   coverage  — weekly/manual instrumented coverage gate; skipped on PR/push.
  #   mount     — a mount-relevant path changed; gates fuse/projfs/fskit checks.
  #   cargo_package_args — selected Cargo package arguments for the main Rust lane.
  #   package_names_csv — selected workspace packages, including reverse dependents.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      rust: ${{ steps.decide.outputs.rust }}
      coverage: ${{ steps.decide.outputs.coverage }}
      mount: ${{ steps.decide.outputs.mount }}
      docs_only: ${{ steps.decide.outputs.docs_only }}
      release_only: ${{ steps.decide.outputs.release_only }}
      all_packages: ${{ steps.affected.outputs.all_packages }}
      skip_cargo: ${{ steps.affected.outputs.skip_cargo }}
      bench_all: ${{ steps.affected.outputs.bench_all }}
      package_names_csv: ${{ steps.affected.outputs.package_names_csv }}
      cargo_package_args: ${{ steps.affected.outputs.cargo_package_args }}
      postgres: ${{ steps.affected_scopes.outputs.postgres }}
      cli_checks: ${{ steps.affected_scopes.outputs.cli_checks }}
      cli_fault: ${{ steps.affected_scopes.outputs.cli_fault }}
      repo_fault: ${{ steps.affected_scopes.outputs.repo_fault }}
      fault_tests: ${{ steps.affected_scopes.outputs.fault_tests }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Two commits handles common push diffs. Multi-commit pushes and PR
          # bases are fetched explicitly below before diffing.
          fetch-depth: 2
      - id: decide
        run: |
          # Fail-closed helper: on any uncertainty (fetch or diff failure,
          # empty diff, missing push base) run the full matrix. The
          # alternative — silently skipping because an errored/empty diff
          # matched no path regex — is the "infrastructure failure removes
          # coverage" pattern hardened in heddle#89.
          run_all() {
            echo "$1; running full matrix fail-closed" >&2
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "coverage=false" >> "$GITHUB_OUTPUT"
            echo "mount=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "release_only=false" >> "$GITHUB_OUTPUT"
            echo "force_all=true" >> "$GITHUB_OUTPUT"
            exit 0
          }

          event="${{ github.event_name }}"
          before="${{ github.event.before }}"
          if [ "$event" = "schedule" ] || [ "$event" = "workflow_dispatch" ]; then
            echo "$event event; running coverage only" >&2
            echo "rust=false" >> "$GITHUB_OUTPUT"
            echo "coverage=true" >> "$GITHUB_OUTPUT"
            echo "mount=false" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "release_only=false" >> "$GITHUB_OUTPUT"
            echo "force_all=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$event" = "pull_request" ]; then
            if ! git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"; then
              run_all "fetch failed"
            fi
            set +e
            diff_output=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
            diff_rc=$?
            set -e
          elif [ "$event" = "push" ]; then
            if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
              run_all "push event has no usable before SHA"
            fi
            if ! git fetch --no-tags --depth=1 origin "$before"; then
              run_all "before-SHA fetch failed"
            fi
            set +e
            diff_output=$(git diff --name-only "$before" HEAD)
            diff_rc=$?
            set -e
          else
            run_all "unsupported event ($event)"
          fi
          if [ "$diff_rc" -ne 0 ]; then
            run_all "git diff exited $diff_rc"
          fi
          # An empty diff means we can't prove the change is doc-only;
          # fail-closed rather than skip the whole suite.
          if [ -z "$(printf '%s' "$diff_output" | tr -d '[:space:]')" ]; then
            run_all "empty diff"
          fi
          printf '%s\n' "$diff_output" > changed-paths.txt

          # docs_only: EVERY changed path is a non-build doc path that the
          # Rust suite does not validate. The catch: the `heddle-cli`
          # integration tests assert `doctor docs --all` (which natively
          # walks the repo and scans EVERY `.md` except those under
          # `docs/spikes/` — see IGNORE_PATTERNS in
          # crates/cli/src/cli/commands/doctor_docs.rs) and `doctor
          # schemas` (which parses `docs/json-schemas.md`) stay clean, and
          # `check-and-test`'s `Doctor schemas drift gate` step reruns the
          # built binary's `doctor schemas` against `docs/json-schemas.md`.
          # So top-level READMEs and any other `docs/*.md` DO feed those
          # gates and are NOT doc-only — only `docs/spikes/**` is exempt
          # there, making it the sole doc-only prefix. Fail-safe: any path
          # outside it ⇒ not doc-only ⇒ rust=true (run the suite).
          if ! printf '%s\n' "$diff_output" | grep -vE '^(docs/spikes/|[[:space:]]*$)' \
              > /dev/null; then
            docs_only=true
          else
            docs_only=false
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

          # release_only: release/publish workflow plumbing that has its own
          # static contract workflow and should not burn the Rust test matrix.
          # Any source, Cargo, non-release script, or product doc path falls
          # through to rust=true below.
          if ! printf '%s\n' "$diff_output" | grep -vE '^((\.github/workflows/(release|release-pipeline-check|publish-crates)\.yml|RELEASING\.md|scripts/(check-release-pipeline|check-publish-pipeline|render-homebrew-cask|build-macos-cask-artifact)\.sh|crates/mount/swift/HeddleHost/(README\.md|dmg/.*))|[[:space:]]*)$' \
              > /dev/null; then
            release_only=true
          else
            release_only=false
          fi
          echo "release_only=$release_only" >> "$GITHUB_OUTPUT"

          if [ "$docs_only" = "true" ] || [ "$release_only" = "true" ]; then
            rust=false
          else
            rust=true
          fi
          echo "rust=$rust" >> "$GITHUB_OUTPUT"

          # Coverage uses an instrumented workspace build and is intentionally
          # kept off the hot PR/push path. The weekly/manual branch above is
          # the only automatic source of coverage=true.
          echo "coverage=false" >> "$GITHUB_OUTPUT"

          # mount: use the transitive mount-relevant path set (mount → repo →
          # {crypto, oplog, wire, objects, refs} → optional runtime-bridge,
          # plus the compare script, the workflow, and shared workspace
          # inputs) so mount adapters and their read-path dependencies trigger
          # the kernel adapter checks.
          if printf '%s\n' "$diff_output" | grep -E \
              '^(crates/(mount|objects|repo|refs|oplog|crypto|wire|runtime-bridge)/|scripts/fuse-bench-compare\.py|scripts/tests/|\.github/workflows/rust-tests\.yml|Cargo\.lock$|Cargo\.toml$)' \
              > /dev/null; then
            echo "mount=true" >> "$GITHUB_OUTPUT"
          else
            echo "mount=false" >> "$GITHUB_OUTPUT"
          fi
          echo "force_all=false" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        if: steps.decide.outputs.rust == 'true'

      - id: affected
        if: steps.decide.outputs.rust == 'true'
        run: |
          set -euo pipefail
          if [ "${{ steps.decide.outputs.force_all }}" = "true" ]; then
            bash scripts/ci-affected-rust-packages.sh --all --github-output "$GITHUB_OUTPUT"
          else
            bash scripts/ci-affected-rust-packages.sh --changed-paths changed-paths.txt --github-output "$GITHUB_OUTPUT"
          fi

      - id: affected_scopes
        if: steps.decide.outputs.rust == 'true'
        env:
          AFFECTED_PACKAGES: ${{ steps.affected.outputs.package_names_csv }}
          ALL_PACKAGES: ${{ steps.affected.outputs.all_packages }}
        run: |
          set -euo pipefail
          selected=",$AFFECTED_PACKAGES,"
          has_package() {
            [ "$ALL_PACKAGES" = "true" ] || [[ "$selected" == *",$1,"* ]]
          }
          write_bool() {
            if "$2"; then
              echo "$1=true" >> "$GITHUB_OUTPUT"
            else
              echo "$1=false" >> "$GITHUB_OUTPUT"
            fi
          }

          postgres_needed() { has_package heddle-refs || has_package heddle-oplog; }
          cli_needed() { has_package heddle-cli; }
          repo_needed() { has_package heddle-repo; }
          fault_needed() { cli_needed || repo_needed; }

          write_bool postgres postgres_needed
          write_bool cli_checks cli_needed
          write_bool cli_fault cli_needed
          write_bool repo_fault repo_needed
          write_bool fault_tests fault_needed

  # Default-feature quality lane. Build, clippy, tests, and executable-backed
  # CLI contracts share one `target/`; independent benchmark and alternate-
  # feature compile contracts run in parallel below so they do not extend this
  # job's critical path or invalidate its default-feature artifacts.
  quality:
    name: Quality
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-tests-${{ runner.os }}
          cache-on-failure: true

      # 1. Warm target/ for the affected package set, then run clippy and
      #    tests against the same selection so all three commands reuse the
      #    same local build products. Selection is the changed crate(s) plus
      #    reverse dependents, so lower-level changes still exercise the crates
      #    that compile against them.
      - name: Build, clippy, and test affected packages
        if: needs.changes.outputs.skip_cargo != 'true'
        env:
          CARGO_PACKAGE_ARGS: ${{ needs.changes.outputs.cargo_package_args }}
          PACKAGE_NAMES: ${{ needs.changes.outputs.package_names_csv }}
        run: |
          set -euo pipefail
          read -r -a package_args <<< "$CARGO_PACKAGE_ARGS"
          echo "Selected packages: ${PACKAGE_NAMES:-<none>}"

          echo "::group::cargo build"
          cargo build --locked "${package_args[@]}" --tests
          echo "::endgroup::"

          echo "::group::cargo clippy"
          cargo clippy --locked "${package_args[@]}" --all-targets -- -D warnings
          echo "::endgroup::"

          echo "::group::cargo test"
          cargo test --locked "${package_args[@]}"
          echo "::endgroup::"

      - name: Human and agent CLI cold flows
        if: needs.changes.outputs.cli_checks == 'true'
        run: |
          set -euo pipefail
          HEDDLE_BIN="$PWD/target/debug/heddle" bash scripts/verify-cold-flow-human.sh
          HEDDLE_BIN="$PWD/target/debug/heddle" bash scripts/verify-cold-flow-agent.sh

      - name: No affected Rust packages
        if: needs.changes.outputs.skip_cargo == 'true'
        run: echo "No affected Rust packages selected; running script-only checks."

      # Unit tests for `scripts/fuse-bench-compare.py`. The perf gate is only
      # as honest as the compare script; these tests pin the "missing or
      # corrupt estimates fail closed" contract (Codex r1 P1 on heddle#89).
      # Plain `unittest`, no third-party deps.
      - name: Bench-compare script unit tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py' -v

      # Verify the default install produces `heddle-fuse-worker` before any
      # alternate-feature compilation can replace default artifacts in this
      # job's target directory. The sibling lookup in
      # `mount::worker::default_worker_binary` depends on both binaries being
      # installed together; otherwise Linux mounts silently fall back to NFS.
      - name: Default install ships mount worker
        if: needs.changes.outputs.cli_checks == 'true'
        run: bash scripts/check-default-install-ships-worker.sh

      # Assert `heddle doctor schemas` reports no drift between the
      # generated schema mirrors and the documented `--output json`
      # samples in `docs/json-schemas.md`. IMPROVEMENT_PLAN §7's DoD
      # requires this surface stay clean after any Principal/output-
      # boundary change (heddle#593); the script builds `heddle` from
      # this checkout, runs `doctor schemas`, and propagates its
      # non-zero exit on drift (heddle#605).
      - name: Doctor schemas drift gate
        if: needs.changes.outputs.cli_checks == 'true'
        run: bash scripts/check-doctor-schemas-clean.sh

      - name: sccache stats
        run: sccache --show-stats

  # Independent compile-only contracts. These intentionally use a separate
  # target directory/job from the default quality lane: alternate CLI feature
  # checks otherwise force Cargo to rebuild the default binaries, and benchmark
  # linking is independent of the test runtime. FUSE benchmarks remain owned
  # by `fuse-smoke`, whose runner has the required system libraries.
  compile-contracts:
    name: Compile contracts
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: compile-contracts-${{ runner.os }}
          cache-on-failure: true

      # Compile every selected non-FUSE benchmark target in the dev profile
      # without running measurements. The scheduled benchmark workflow owns
      # optimized performance trends; this PR-safe link guard catches rotten
      # bench code, Cargo target declarations, and non-default feature sets.
      - name: Compile benchmark targets
        env:
          AFFECTED_PACKAGES: ${{ needs.changes.outputs.package_names_csv }}
          ALL_PACKAGES: ${{ needs.changes.outputs.all_packages }}
          BENCH_ALL: ${{ needs.changes.outputs.bench_all }}
        run: |
          set -euo pipefail
          python3 scripts/discover-benches.py > benchmark-plan.tsv
          cat benchmark-plan.tsv
          selected=",$AFFECTED_PACKAGES,"
          ran=0
          while IFS=$'\t' read -r package bench features; do
            [ -n "$package" ] || continue
            if [ "$features" = "fuse" ] || [[ "$features" == fuse,* ]] || [[ "$features" == *,fuse ]] || [[ "$features" == *,fuse,* ]]; then
              echo "skipping $package/$bench: fuse benches are covered by the fuse-smoke job"
              continue
            fi
            if [ "$ALL_PACKAGES" != "true" ] && [ "$BENCH_ALL" != "true" ] && [[ "$selected" != *",$package,"* ]]; then
              echo "skipping $package/$bench: package not affected"
              continue
            fi
            echo "::group::$package/$bench"
            cmd=(cargo build --locked -p "$package" --bench "$bench")
            if [ -n "$features" ]; then
              cmd+=(--features "$features")
            fi
            printf 'running:'
            printf ' %q' "${cmd[@]}"
            printf '\n'
            "${cmd[@]}"
            ran=1
            echo "::endgroup::"
          done < benchmark-plan.tsv
          if [ "$ran" -eq 0 ]; then
            echo "No non-FUSE benchmark targets selected."
          fi

      # Verify the three supported OSS/hosted CLI feature shapes without
      # invalidating the default-feature binaries used by the quality lane.
      - name: CLI alternate-feature checks
        if: needs.changes.outputs.cli_checks == 'true'
        run: |
          set -euo pipefail
          cargo check --locked -p heddle-cli --no-default-features --features git-overlay,semantic,zstd
          cargo check --locked -p heddle-cli --no-default-features --features native,semantic,zstd
          cargo check --locked -p heddle-cli --features client

      - name: sccache stats
        run: sccache --show-stats

  # Postgres integration tests. The `postgres` feature is the server /
  # weft code path (`PgRefBackend`, `PgOpLogBackend`); its `#[ignore]`-gated
  # tests (`crates/refs/.../pg_refs.rs`, `crates/oplog/.../pg_oplog.rs`) need
  # a reachable database. A `postgres:18` service container provides one and
  # `DATABASE_URL` points the test setup at it — without that env var the
  # tests fall back to an unreachable placeholder (port 1), so a plain
  # `cargo test` stays hermetic and DB-free. This job owns both the live
  # round-trip and the postgres-feature clippy gate so the backend is compiled
  # once, outside the default quality lane.
  postgres-tests:
    name: Postgres integration tests
    needs: changes
    if: needs.changes.outputs.postgres == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: heddle_test
          POSTGRES_PASSWORD: heddle_test
          POSTGRES_DB: heddle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: postgres-tests-${{ runner.os }}
          cache-on-failure: true

      # Scope to the two crates that own the postgres backends: a
      # workspace-wide `--ignored` run would also pull in unrelated
      # `#[ignore]`-gated suites (FUSE/NFS smoke, perf, real-git) that need
      # environments this runner doesn't have. `-p heddle-refs -p
      # heddle-oplog` compiles only the pg backends, and `--ignored` then
      # selects exactly their two integration tests (they're `#[ignore]`-gated
      # so a default `cargo test --features postgres` skips them).
      # `--test-threads=1` keeps the shared service DB deterministic;
      # `--nocapture` surfaces the live round-trip in the log so it's clear
      # the tests actually ran against the container and were not no-op'd by
      # the unreachable-placeholder fallback.
      - name: Postgres integration tests
        env:
          DATABASE_URL: postgres://heddle_test:heddle_test@localhost:5432/heddle_test
          AFFECTED_PACKAGES: ${{ needs.changes.outputs.package_names_csv }}
          ALL_PACKAGES: ${{ needs.changes.outputs.all_packages }}
        run: |
          set -euo pipefail
          selected=",$AFFECTED_PACKAGES,"
          packages=()
          features=()

          if [ "$ALL_PACKAGES" = "true" ] || [[ "$selected" == *,heddle-refs,* ]]; then
            packages+=(-p heddle-refs)
            features+=(heddle-refs/postgres)
          fi
          if [ "$ALL_PACKAGES" = "true" ] || [[ "$selected" == *,heddle-oplog,* ]]; then
            packages+=(-p heddle-oplog)
            features+=(heddle-oplog/postgres)
          fi

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "Skipping postgres integration tests; refs/oplog not affected."
            exit 0
          fi

          feature_arg=$(IFS=,; echo "${features[*]}")
          cargo test --locked "${packages[@]}" --features "$feature_arg" \
            -- --ignored --test-threads=1 --nocapture

          echo "::group::cargo clippy postgres storage backends"
          cargo clippy --locked "${packages[@]}" --all-targets \
            --features "$feature_arg" -- -D warnings
          echo "::endgroup::"

      - name: sccache stats
        run: sccache --show-stats

  # Preserve the repository ruleset's required `Check & test` context while
  # allowing its independent prerequisites to execute in parallel. A moved
  # compile contract must remain blocking, not become an advisory side job.
  check-and-test:
    name: Check & test
    needs:
      - changes
      - quality
      - compile-contracts
      - postgres-tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every extracted quality gate
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUST_REQUIRED: ${{ needs.changes.outputs.rust }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          COMPILE_CONTRACTS_RESULT: ${{ needs.compile-contracts.result }}
          POSTGRES_REQUIRED: ${{ needs.changes.outputs.postgres }}
          POSTGRES_RESULT: ${{ needs.postgres-tests.result }}
        run: |
          set -euo pipefail
          require_success() {
            local name=$1
            local result=$2
            if [ "$result" != "success" ]; then
              echo "ERROR: $name finished with result '$result'" >&2
              exit 1
            fi
          }

          allow_success_or_skipped() {
            local name=$1
            local result=$2
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "ERROR: $name finished with result '$result'" >&2
              exit 1
            fi
          }

          require_success "Detect changed paths" "$CHANGES_RESULT"
          case "$RUST_REQUIRED" in
            true)
              require_success "Quality" "$QUALITY_RESULT"
              require_success "Compile contracts" "$COMPILE_CONTRACTS_RESULT"
              if [ "$POSTGRES_REQUIRED" = "true" ]; then
                require_success "Postgres integration tests" "$POSTGRES_RESULT"
              else
                allow_success_or_skipped "Postgres integration tests" "$POSTGRES_RESULT"
              fi
              ;;
            false)
              allow_success_or_skipped "Quality" "$QUALITY_RESULT"
              allow_success_or_skipped "Compile contracts" "$COMPILE_CONTRACTS_RESULT"
              allow_success_or_skipped "Postgres integration tests" "$POSTGRES_RESULT"
              ;;
            *)
              echo "ERROR: Detect changed paths produced unknown rust selection '$RUST_REQUIRED'" >&2
              exit 1
              ;;
          esac

  # CLI crash-recovery / atomicity tests. These are `#[ignore]` because they
  # spawn child `heddle` processes with `HEDDLE_FAULT_INJECT` armed, so the
  # default workspace test run intentionally skips them. Keep this filter on
  # the `fault_injection` module only: the same `cli_integration` ignored set
  # also contains timing-sensitive perf smoke and real-world Git fixture tests
  # that are not deterministic enough to become a required Rust gate.
  cli-fault-injection-tests:
    name: CLI fault-injection tests
    needs: changes
    if: needs.changes.outputs.fault_tests == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-fault-injection-tests-${{ runner.os }}
          cache-on-failure: true

      - name: CLI fault-injection tests
        if: needs.changes.outputs.cli_fault == 'true'
        run: |
          cargo test --locked -p heddle-cli --test cli_integration fault_injection:: \
            -- --ignored --test-threads=1 --nocapture

      - name: Timeline materialization crash tests
        if: needs.changes.outputs.repo_fault == 'true'
        run: |
          cargo test --locked -p heddle-repo --test timeline_materialize_fault \
            -- --ignored --test-threads=1 --nocapture

      - name: sccache stats
        run: sccache --show-stats

  # Linux FUSE mount smoke. Pinned to a GitHub-hosted `ubuntu-latest`
  # runner so we get `/dev/fuse`, `fusermount3`, and the system-wide
  # FUSE policy without having to special-case the Blacksmith image.
  # The blacksmith ARM runner above doesn't ship `fuse3 libfuse3-dev`
  # by default, and asking it to install them post-boot adds image
  # drift we'd rather not chase.
  #
  # This job is the load-bearing check that Linux teammates can mount
  # a heddle thread, read it, write through the mount, and unmount
  # cleanly — i.e. the "use heddle over git in repo development"
  # daily-use path. If it breaks, the daily-use story breaks.
  #
  # The `fuse_mount.rs` integration tests are `#[ignore]` so they
  # don't run by default (a `cargo test -p heddle-mount` from a
  # contributor's laptop doesn't need FUSE installed). This job opts
  # in explicitly with `-- --ignored`.
  fuse-smoke:
    name: FUSE mount smoke (Linux)
    needs: changes
    if: needs.changes.outputs.mount == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuse-smoke-${{ runner.os }}
          cache-on-failure: true

      # `fuse3` ships `fusermount3`, the SUID helper the FUSE shell
      # uses to publish the mount to the kernel; `libfuse3-dev` is
      # what `fuser`'s build links against.
      - name: Install FUSE
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3 libfuse3-dev
          fusermount3 --version
          ls -l /dev/fuse

      # Compile-check all FUSE benchmark targets without running the
      # measurements. The scheduled/manual `Benchmarks` workflow owns perf
      # trends; this PR gate only keeps FUSE bench code from rotting.
      - name: Compile FUSE benchmark targets
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        run: cargo build --locked --features fuse -p heddle-mount --benches

      # Single-threaded so a kernel-side hang on one mount can't
      # cascade into the others' tempdir lifetimes. `--nocapture` so
      # the CI log shows the FUSE write/release path if a test
      # regresses.
      - name: FUSE integration tests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        run: |
          cargo test --locked -p heddle-mount --features fuse --test fuse_mount \
            -- --ignored --test-threads=1 --nocapture

      # Panic-recovery unit tests live alongside the FUSE shell; run
      # them on the same job so a regression in the `guard_call`
      # contract trips a single, well-scoped CI failure.
      - name: FUSE panic-recovery unit tests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        run: |
          cargo test --locked -p heddle-mount --features fuse --lib fuse::

      # FUSE worker resource-cleanup tests (Codex r2 P2 findings on
      # heddle#190): assert that a failed `Command::spawn` doesn't
      # leak the child IPC fd, and that a failed watcher-thread
      # spawn still reaps the started worker. Neither test needs
      # `/dev/fuse` — the failures are before the mount — so they
      # run as plain (non-`--ignored`) tests under the fuse feature.
      - name: FUSE worker resource-cleanup tests
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        # Split into two invocations: a positional TESTNAME filter applies
        # to every selected target, so combining `--test ...` with `--lib
        # <name-filter>` would silently filter the integration target down
        # to zero tests. Run each target with its own filter.
        run: |
          cargo test --locked -p heddle-mount --features fuse \
            --lib worker::tests::supervise_watcher_spawn_reaps_child_on_failure
          cargo test --locked -p heddle-mount --features fuse \
            --test fuse_worker_resource_cleanup

      - name: sccache stats
        run: sccache --show-stats

  # Windows ProjFS mount smoke. Mirrors `fuse-smoke` above for the
  # Windows daily-use path. The runner needs the "Projected File
  # System" optional feature enabled before the test will mount;
  # `windows-latest` (Server 2022) ships with the *capability* but
  # not the feature itself, so the first step DISM-enables it.
  #
  # The integration test in `tests/projfs_smoke.rs` is `#[ignore]` and
  # additionally guarded by `HEDDLE_PROJFS_AVAILABLE=1` so a generic
  # contributor's `cargo test -p heddle-mount` on macOS or Linux
  # doesn't try to mount through a missing kernel adapter. CI opts
  # in explicitly via the env var below + `-- --ignored`.
  #
  # If the DISM step fails (newer Server SKUs sometimes rename the
  # feature, and home-edition Windows 10 hosts may have it disabled
  # at the SKU level), the test will report itself as skipped via
  # the `ProjFsShell::is_runtime_available()` guard in the smoke
  # source. The job exits 0 in that case; treat a hard `assertion
  # failed` from the test as the real regression signal.
  projfs-smoke:
    name: ProjFS mount smoke (Windows)
    needs: changes
    if: needs.changes.outputs.mount == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      # Enable the ProjFS optional feature. `Client-ProjFS` is the
      # canonical name on Windows 10/11 client SKUs; `Projected-FS`
      # is the Server variant. Try Client first (matches the docs we
      # ship to teammates), fall back to the Server name. Either
      # exit-success leaves us with `ProjectedFSLib.dll` on PATH.
      #
      # `-NoRestart` keeps the step from rebooting the runner —
      # ProjFS enables in-place and is usable immediately for new
      # processes, which is exactly what the cargo step below is.
      - name: Enable ProjFS optional feature
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $client = Enable-WindowsOptionalFeature -Online -FeatureName Client-ProjFS -NoRestart -ErrorAction SilentlyContinue
          if ($null -eq $client -or $client.RestartNeeded -eq $null) {
            Write-Host "Client-ProjFS unavailable on this SKU; trying Projected-FS (Server variant)"
            $server = Enable-WindowsOptionalFeature -Online -FeatureName Projected-FS -NoRestart -ErrorAction SilentlyContinue
            if ($null -eq $server) {
              Write-Host "::warning::Neither Client-ProjFS nor Projected-FS could be enabled; smoke test will self-skip"
            }
          }
          # Verify the DLL the shell probes for is actually present.
          $dll = Join-Path $env:SystemRoot 'System32\ProjectedFSLib.dll'
          if (Test-Path $dll) {
            Write-Host "ProjectedFSLib.dll present: $dll"
          } else {
            Write-Host "::warning::ProjectedFSLib.dll not present; smoke test will self-skip"
          }

      # Build + run the integration test. Single-threaded to keep a
      # wedged virtualization root from cascading into sibling
      # tempdir lifetimes (the OS would clean up eventually, but the
      # next test would see a partially-torn-down placeholder dir).
      # `--nocapture` so any panic-trampoline log surfaces in the
      # job output for debug.
      - name: ProjFS integration tests
        shell: pwsh
        env:
          HEDDLE_PROJFS_AVAILABLE: "1"
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked -p heddle-mount --features projfs --test projfs_smoke `
            -- --ignored --test-threads=1 --nocapture

      # Panic-recovery + unit-level tests for the ProjFS shell live
      # alongside the source. They're `#[ignore]` (the `windows` dep
      # only links on the `projfs` feature) so a regular workspace
      # `cargo test` doesn't try to run them.
      - name: ProjFS panic-recovery unit tests
        shell: pwsh
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked -p heddle-mount --features projfs --lib projfs:: `
            -- --ignored --test-threads=1

      - name: sccache stats
        shell: pwsh
        run: sccache --show-stats

  # FUSE end-to-end bench. Drives the `fuse_e2e` criterion suite
  # through a real `FuseShell::mount_background` session, then
  # `scripts/fuse-bench-compare.py` flags any workload that
  # regressed > 20% vs the committed baseline at
  # `crates/mount/benches/fuse_e2e_baseline.json`. Sibling of
  # `fuse-smoke`: same runner shape (ubuntu-latest for
  # `/dev/fuse` + `fusermount3`), same FUSE install step, just
  # with `cargo bench` in place of `cargo test --ignored`.
  fuse-bench:
    name: FUSE bench (Linux)
    runs-on: ubuntu-latest
    # PRs compile-check FUSE benches in `fuse-smoke` when mount-relevant paths
    # change. Run noisy timing measurements only after merge to refresh the
    # committed baseline signal.
    if: github.event_name == 'push'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuse-bench-${{ runner.os }}
          cache-on-failure: true

      - name: Install FUSE
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3 libfuse3-dev
          fusermount3 --version
          ls -l /dev/fuse

      # Clear any prior criterion output BEFORE running the bench.
      # `Swatinem/rust-cache` restores `target/` between runs, and
      # `cargo bench` does not delete benchmark dirs that the current
      # run didn't touch — so a renamed-or-removed `(group, variant)`
      # from a previous CI run would leave a stale `estimates.json`
      # behind. The compare script (`discover_actual_ids`) walks the
      # whole criterion tree to enforce coverage; without this
      # cleanup, residue would surface as false-positive "unexpected
      # ID" failures. Codex r2 P2 flagged this. The `cargo bench`
      # incremental build cache lives elsewhere (target/release/) and
      # is untouched.
      - name: Clear stale criterion residue
        run: rm -rf target/criterion

      # Complete the benchmark rot-guard invariant documented in the
      # `Compile benchmark targets` step: this FUSE-capable job
      # compile-checks every `heddle-mount` bench target in the dev
      # profile, including future FUSE benches, before running the
      # measured optimized suite.
      - name: Compile FUSE benchmark targets
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        run: cargo build --locked --features fuse -p heddle-mount --benches

      # Run the bench. Criterion writes per-workload `estimates.json`
      # under `target/criterion/<group>/<variant>/new/` which the
      # compare script picks up. We capture the full stdout to an
      # artifact so PR reviewers can see the raw numbers without
      # re-running.
      - name: cargo bench
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        run: |
          cargo bench --locked --features fuse -p heddle-mount --bench fuse_e2e \
            2>&1 | tee fuse_e2e_bench.log

      - name: Compare to baseline (flag >20% regressions)
        run: |
          python3 scripts/fuse-bench-compare.py \
            --criterion-dir target/criterion \
            --baseline crates/mount/benches/fuse_e2e_baseline.json \
            --threshold 0.20 \
            | tee fuse_e2e_compare.txt

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuse-e2e-bench
          path: |
            fuse_e2e_bench.log
            fuse_e2e_compare.txt
            target/criterion/

      - name: sccache stats
        run: sccache --show-stats

  # Coverage requires an instrumented build that can't share `target/`
  # with the regular profile, so it stays as a weekly/manual job instead of
  # running on every PR or push.
  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.coverage == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage-${{ runner.os }}
          cache-on-failure: true

      # `--all-features` would enable `heddle-cli/weft-client`, which from
      # OSS resolves to the 0.0.0 reservation stub and won't compile.
      # Cover the OSS feature set instead.
      - name: Generate coverage report
        run: cargo llvm-cov --locked --workspace --features git-overlay,native,semantic,zstd --lcov --output-path lcov.info

      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only | tee coverage-summary.txt

      # The HTML report + its artifact upload are a developer convenience
      # for browsing line-level coverage on main; they add a second
      # report pass and an artifact upload that PRs don't need (the
      # codecov upload + the per-crate gate below carry the PR signal).
      # Build/upload it only on push to main.
      - name: Generate HTML coverage report
        if: github.event_name != 'pull_request'
        run: cargo llvm-cov report --html

      # Per-crate coverage gate. Keep the --gate thresholds in sync with
      # codecov.yml's `coverage.status.project.<crate>.target` and with
      # the table in docs/contributor-guide/coverage.md. See
      # heddle-devtools::run_audit_coverage for the parsing and reporting
      # logic. This step fails the job BEFORE the Codecov upload, so a
      # per-crate regression turns the build red on both `main` pushes and
      # PRs regardless of whether Codecov is reachable.
      #
      # `crates/grpc` is intentionally not gated: its surface is tonic-
      # generated code emitted to OUT_DIR, which never lands under
      # `crates/grpc/` in lcov, so audit-coverage would `bail` with
      # "no lines counted". Its 60% goal is tracked in the doc only.
      - name: Coverage gate (per crate)
        run: |
          cargo run -p heddle-devtools --quiet -- \
            audit-coverage lcov.info \
              --gate objects=80 \
              --gate refs=80 \
              --gate repo=85 \
              --gate cli=75 \
              --gate mount=68 \
              --gate semantic=80 \
              --gate oplog=78 \
              --gate wire=80 \
              --gate state_review=80 \
              --gate crypto=80 \
              --gate daemon=80 \
              --gate ingest=80

      - name: Upload coverage to Codecov
        if: ${{ env.HAVE_CODECOV_TOKEN == 'true' }}
        env:
          HAVE_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
          verbose: true

      - name: Publish coverage summary
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload HTML coverage report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html
          if-no-files-found: error

      - name: sccache stats
        run: sccache --show-stats

  # The fskit feature is cfg(target_os = "macos") and most PR lanes run on
  # Linux. Without this job, FSKit changes can land
  # compile-unverified — caught on PR #667, whose FSKit fix was authored on
  # a Linux box. `cargo check` also exercises build.rs's swiftc compile of
  # the HeddleFSKit bridge, so the Swift side is validated too.
  fskit-check:
    name: FSKit compile check (macOS)
    needs: changes
    if: needs.changes.outputs.mount == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    env:
      # The workflow-level RUSTC_WRAPPER points at sccache, which only the
      # main job installs; without this override cargo dies at startup.
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fskit-check
      - name: cargo check with fskit
        run: cargo check --locked -p heddle-mount --features fskit
