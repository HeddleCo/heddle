name: publish-manifest
description: Open or refresh a package-manifest update PR in another repository.

inputs:
  target-repo:
    required: true
    description: owner/name of the target package repository.
  manifest-path:
    required: true
    description: Path inside the target repository to update.
  rendered-file:
    required: true
    description: >-
      Rendered manifest path in the caller workspace. A regular file is copied
      to manifest-path. A directory is synced onto manifest-path as a whole
      tree (used by the apt channel, whose pool + signed index is a tree, not a
      single file); manifest-path '.' means the target repository root.
  token:
    required: true
    description: GitHub App installation token with contents and pull-request write access.
  channel:
    required: true
    description: Package channel label, e.g. homebrew.
  version:
    required: true
    description: Package version without a leading v.

runs:
  using: composite
  steps:
    - name: Checkout package repository
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.target-repo }}
        token: ${{ inputs.token }}
        path: package-repo

    - name: Copy rendered manifest
      shell: bash
      env:
        RENDERED_FILE: ${{ inputs.rendered-file }}
        MANIFEST_PATH: ${{ inputs.manifest-path }}
      run: |
        set -euo pipefail
        if [[ -d "$RENDERED_FILE" ]]; then
          # Directory source (apt pool + signed index): sync the whole tree.
          # manifest-path '.' targets the repository root.
          if [[ "$MANIFEST_PATH" == "." ]]; then
            dest="package-repo"
          else
            dest="package-repo/$MANIFEST_PATH"
            mkdir -p "$dest"
          fi
          cp -a "$RENDERED_FILE/." "$dest/"
        else
          mkdir -p "package-repo/$(dirname "$MANIFEST_PATH")"
          cp "$RENDERED_FILE" "package-repo/$MANIFEST_PATH"
        fi

    - name: Open package update PR
      uses: peter-evans/create-pull-request@v7
      with:
        path: package-repo
        token: ${{ inputs.token }}
        branch: heddle-release/${{ inputs.channel }}/${{ inputs.version }}
        delete-branch: true
        commit-message: Update Heddle ${{ inputs.channel }} to ${{ inputs.version }}
        title: Update Heddle ${{ inputs.channel }} to ${{ inputs.version }}
        body: |
          Updates Heddle ${{ inputs.channel }} packaging for `${{ inputs.version }}`.

          This PR was generated by the `Release binaries` workflow after a stable Heddle tag was published.
