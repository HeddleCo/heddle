# ---------------------------------------------------------------------------
# CLI integration shards (high signal, not entire cli test matrix)
# ---------------------------------------------------------------------------

[[jobs]]
id = "cli-core-functionality"
kind = "cargo-test"
package = "heddle-cli"
test_target = "core_functionality"
oracle = false
perf_eligible = false
platforms = ["any"]
required = true

[[jobs]]
id = "cli-state-management"
kind = "cargo-test"
package = "heddle-cli"
test_target = "state_management"
oracle = false
perf_eligible = false
platforms = ["any"]
required = true

[[jobs]]
id = "formal-specs"
kind = "cargo-test"
package = "heddle-cli"
test_target = "formal_specs"
oracle = true
perf_eligible = false
platforms = ["any"]
required = true
notes = "Rust property/regression tests derived from Quint models"

# ---------------------------------------------------------------------------
# Performance (not default curated; opt-in suite=perf)
# ---------------------------------------------------------------------------

[[jobs]]
id = "core-loop-perf-smoke"
kind = "cargo-test"
package = "heddle-cli"
test_target = "cli_integration"
filter = "core_loop_command_surface_perf_smoke"
release = true
ignored = true
oracle = false
perf_eligible = true
platforms = ["any"]
required = false
suite = "perf"
notes = "Equal-work command surface budgets; ignored by default; requires release binary"

# ---------------------------------------------------------------------------
# Explicit exclusions (not run as curated; justification required)
# ---------------------------------------------------------------------------

[[exclusions]]
id = "full-cli-integration-matrix"
reason = "Too large for every local baseline; shards selected above; full matrix remains CI responsibility"
replacement = "cli-core-functionality + state-management + oracles"

[[exclusions]]
id = "realworld-git-stress"
reason = "Stress/shape coverage; not equal-work oracle; some cases ignored/large"
replacement = "roundtrip-fidelity + commit-conformance"

[[exclusions]]
id = "mount-fuse-benches"
reason = "Platform/prereq heavy; weekly benchmark workflow owns"
replacement = "suite=perf / CI benchmarks.yml"

[[exclusions]]
id = "coverage-llvm-cov"
reason = "Weekly instrumented job; not part of hot baseline"
replacement = "scheduled rust-tests coverage job"
