# Curated correctness / oracle / quality suite for the Heddle improvement program.
# Source of truth for test selection, exclusions, oracle applicability, and perf eligibility.
#
# Classification statuses used by the runner:
#   pass | fail | skip_prereq | todo_known | timeout | setup_fail | aborted | incomparable

schema_version = 1
program = "heddle-correctness-architecture-performance"
default_features_note = "CLI default: git-overlay,native,local,semantic,zstd"

[meta]
description = "Curated suite for trustworthy baseline and release gates"
oracle_reference = "Git object identity via Sley; byte-identical round-trip; formal Quint specs"

# ---------------------------------------------------------------------------
# Gates that are not cargo tests
# ---------------------------------------------------------------------------

[[jobs]]
id = "facade-render-free"
kind = "script"
command = ["bash", "scripts/check-facade-render-free.sh"]
oracle = false
perf_eligible = false
platforms = ["any"]
required = true
notes = "Domain/facade crates must not depend on clap/anstyle/anstream/indicatif/console/termcolor/owo-colors"

[[jobs]]
id = "fmt-check"
kind = "script"
# Workspace rustfmt.toml uses nightly-only options (imports_granularity,
# group_imports). Stable `cargo fmt` is incomparable and must not be used to
# rewrite the tree. Prefer rustup nightly when present.
command = ["bash", "scripts/program/fmt-check.sh"]
oracle = false
perf_eligible = false
platforms = ["any"]
required = true
prerequisites = ["rustfmt-nightly"]
notes = "Formatting gate via nightly rustfmt; skip_prereq if nightly unavailable"

# ---------------------------------------------------------------------------
# Process / dependency oracles
# ---------------------------------------------------------------------------

[[jobs]]
id = "git-process-lint"
kind = "cargo-test"
package = "heddle-cli"
test_target = "git_process_lint"
oracle = true
perf_eligible = false
platforms = ["any"]
required = true
notes = "No unreviewed runtime git process spawns; engine is Sley not gix"

# ---------------------------------------------------------------------------
# Git fidelity oracles
# ---------------------------------------------------------------------------

[[jobs]]
id = "roundtrip-fidelity"
kind = "cargo-test"
package = "heddle-cli"
test_target = "roundtrip_fidelity"
oracle = true
perf_eligible = false
platforms = ["any"]
required = true
prerequisites = ["git"]
notes = "Byte-identical adopt/import→export SHAs + git fsck; uses git for fixture build and fsck oracle"

[[jobs]]
id = "commit-conformance"
kind = "cargo-test"
package = "heddle-cli"
test_target = "commit_conformance"
oracle = true
perf_eligible = false
platforms = ["any"]
required = true
prerequisites = ["git"]
notes = "Commit object corpus conformance"

[[jobs]]
id = "git-projection-engine"
kind = "cargo-test"
package = "heddle-cli"
test_target = "git_projection_engine_integration"
oracle = true
perf_eligible = false
platforms = ["any"]
required = true
prerequisites = ["git"]
notes = "Projection engine integration including annotated tag SHA preservation"

