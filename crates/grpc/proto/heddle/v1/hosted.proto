syntax = "proto3";

package heddle.v1;

import "heddle/v1/options.proto";

import "google/protobuf/timestamp.proto";
import "heddle/v1/common.proto";
import "heddle/v1/policies.proto";
import "heddle/v1/support.proto";

service HostedUserService {
  rpc GetCurrentUserNamespace(GetCurrentUserNamespaceRequest) returns (HostedNamespace) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc CreateNamespace(CreateNamespaceRequest) returns (HostedNamespace) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc UpdateNamespace(UpdateNamespaceRequest) returns (HostedNamespace) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc SetNamespaceVisibility(SetNamespaceVisibilityRequest) returns (HostedNamespace) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc DeleteNamespace(DeleteNamespaceRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc CreateRepository(CreateRepositoryRequest) returns (HostedRepository) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListSpools(ListSpoolsRequest) returns (ListSpoolsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc UpdateRepository(UpdateRepositoryRequest) returns (HostedRepository) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc DeleteRepository(DeleteRepositoryRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }

  // ── Unified spool settings (any spool: namespace or repo) ────────
  // One settings-READ + two settings-WRITEs keyed on `full_path`, so the
  // Settings/Overview/Repos pages get a single surface across namespaces AND
  // repos (incl. CLI-adopted). Unification-aligned: `SpoolSummary.kind` is a
  // UX label only, never structural, so these are ONE spool surface, not split
  // namespace/repo RPCs. Handlers land in weft (a follow-up); this is the
  // contract only (weft#472).
  //
  // Read the full settings + summary metadata for any spool in one call.
  rpc GetSpool(GetSpoolRequest) returns (HostedSpool) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Write a spool's visibility (separate storage column). Mirrors
  // SetNamespaceVisibility but keyed on `full_path` so it applies to repos too.
  rpc SetSpoolVisibility(SetSpoolVisibilityRequest) returns (HostedSpool) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  // Write a spool's general settings (description, etc.). Gives repos a
  // description-write path (UpdateRepository stays rename-only). The server
  // enforces which fields are settable.
  rpc UpdateSpoolSettings(UpdateSpoolSettingsRequest) returns (HostedSpool) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc CreateGrant(CreateGrantRequest) returns (HostedGrant) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc UpdateGrant(UpdateGrantRequest) returns (HostedGrant) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc DeleteGrant(DeleteGrantRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }

  // Resolve opaque subjects (from grants/annotations) to human display
  // info. Today only WhoAmI exists (current session); this is the batch
  // subject-resolution surface the grant/member UIs need so they can render
  // a name + handle instead of the raw subject. Backend impl lives in weft
  // (a follow-up); this is the contract only.
  rpc ResolveSubjects(ResolveSubjectsRequest) returns (ResolveSubjectsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // Resolve a bare handle name (canonical text or bare name) to its
  // principal, so the frontend can route `/gh:<name>` / `/<name>` /
  // `/u:<subject>` URLs. The 404-vs-410 distinction is backed by the
  // tombstone DB invariant: a never-claimed name → gRPC NotFound (→ 404);
  // a tombstoned/renamed-away name → response with `tombstoned = true`
  // (→ 410 Gone), the principal MAY carry the canonical `/u:<subject>`
  // redirect target when available; an active name → the principal. The
  // subject must NOT appear except as that `/u:` redirect target. Backend
  // impl lives in weft (a follow-up); this is the contract only (weft#467).
  rpc ResolveHandle(ResolveHandleRequest) returns (ResolveHandleResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // ── Thread merge approvals ───────────────────────────────────────
  rpc ApproveThread(ApproveThreadRequest) returns (ThreadApproval) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc RevokeApproval(RevokeApprovalRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListThreadApprovals(ListThreadApprovalsRequest) returns (ListThreadApprovalsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc CheckMergeEligibility(CheckMergeEligibilityRequest) returns (CheckMergeEligibilityResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // ── Namespace-scoped invitations and members (formerly admin) ────
  rpc CreateInvitation(CreateInvitationRequest) returns (Invitation) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc RevokeInvitation(RevokeInvitationRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // ── Approval groups (reusable approver pools) ────────────────────
  // Admin role on the repo's parent namespace required to create or
  // mutate; Reader is enough to list.
  rpc CreateApprovalGroup(CreateApprovalGroupRequest) returns (ApprovalGroup) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListApprovalGroups(ListApprovalGroupsRequest) returns (ListApprovalGroupsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc DeleteApprovalGroup(DeleteApprovalGroupRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc AddApprovalGroupMember(AddApprovalGroupMemberRequest) returns (ApprovalGroupMember) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc RemoveApprovalGroupMember(RemoveApprovalGroupMemberRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }

  // ── Thread policies (branch protection) ──────────────────────────
  rpc CreateThreadPolicy(CreateThreadPolicyRequest) returns (ThreadPolicy) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListThreadPolicies(ListThreadPoliciesRequest) returns (ListThreadPoliciesResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc DeleteThreadPolicy(DeleteThreadPolicyRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc AddPolicyGroupRequirement(AddPolicyGroupRequirementRequest) returns (PolicyGroupRequirement) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc RemovePolicyGroupRequirement(RemovePolicyGroupRequirementRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }

  // ── Operator-only listings (gate on staff scope) ─────────────────
  rpc ListActors(ListActorsRequest) returns (ListActorsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc ListWorktrees(ListWorktreesRequest) returns (ListWorktreesResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // ── Support access — customer-issued temporary admin grants for
  // Heddle staff. The grantor must hold Admin on the namespace/repo;
  // the grantee is a staff email. The server materialises a real
  // `hosted_grants` row plus a `support_access_audit` row, both
  // bounded by the supplied TTL.
  rpc GrantSupportAccess(GrantSupportAccessRequest) returns (SupportAccessGrant) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc ListSupportAccessGrants(ListSupportAccessGrantsRequest) returns (ListSupportAccessGrantsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc RevokeSupportAccess(RevokeSupportAccessRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }

  // ── Caller-owned bookmarks ───────────────────────────────────────
  // Accepts both user and anonymous biscuits. Anonymous callers can
  // only write their own bookmark rows; promotion migrates those rows
  // to the eventual user account without granting repo/namespace write
  // permissions.
  rpc ListBookmarks(ListBookmarksRequest) returns (ListBookmarksResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc UpsertBookmark(UpsertBookmarkRequest) returns (Bookmark) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc DeleteBookmark(DeleteBookmarkRequest) returns (DeleteResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }

  // --- Spool child edges + monorepo resolution + facet history ---
  // (Spool epic P8a, weft#358). ADDITIVE: exposes the P4-P7 spool
  // capabilities. Handlers land in weft P8b against weft's registry methods
  // (children::{attach_child_tx,detach_child_tx,list_children,resolve_monorepo}
  // and governance/membership {current_*,*_history}); the messages below mirror
  // those return types so P8b maps 1:1.

  // Attach a child spool under `parent_path` at `mount_name`, anchored at the
  // child's current content head. Mutates only the parent's children edge-set
  // (refs/spool/children/edges), never the parent's Content facet. Mirrors
  // weft `children::attach_child_tx` -> ChildEdge.
  rpc AttachChild(AttachChildRequest) returns (ChildEdge) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Detach the child mounted at `mount_name` under `parent_path`. Mirrors weft
  // `children::detach_child_tx` (bool removed).
  rpc DetachChild(DetachChildRequest) returns (DetachChildResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_NONE };
  }
  // List the child edges of `parent_path`, each resolved with its anchored
  // state + moving-anchored-ff status. Read-only; moves no edge. Mirrors weft
  // `children::list_children` -> Vec<ChildEdge>.
  rpc ListChildren(ListChildrenRequest) returns (ListChildrenResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Recursively resolve the monorepo rooted at `root_path` into the caller's
  // coherent visible slice (per-child visibility, cycle guard, depth bound).
  // Mirrors weft `children::resolve_monorepo` -> MonorepoNode.
  rpc ResolveMonorepo(ResolveMonorepoRequest) returns (MonorepoNode) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Walk `spool_path`'s governance facet history newest-first (first-parent).
  // Mirrors weft `governance::governance_history` -> Vec<GovernanceHistoryEntry>.
  rpc GetGovernanceHistory(GetGovernanceHistoryRequest) returns (GetGovernanceHistoryResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Walk `spool_path`'s membership facet history newest-first (first-parent).
  // Mirrors weft `membership::membership_history` -> Vec<MembershipHistoryEntry>.
  rpc GetMembershipHistory(GetMembershipHistoryRequest) returns (GetMembershipHistoryResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // ── Git-native identity proofs (Prove; wraps weft's F1a engine) ──
  // A caller proves control of a repo on an external host by publishing a
  // marker line to a well-known path, then submitting the challenge for
  // verification. Handlers land in weft (a follow-up); this is the contract.
  //
  // Start a proof: the server returns the exact marker line + well-known path
  // the caller must publish to `repo` on `host`.
  rpc RequestProofChallenge(RequestProofChallengeRequest) returns (RequestProofChallengeResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_TRANSIENT_WRITE deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Submit a started challenge for verification; the server fetches the marker
  // and returns the resulting status.
  rpc SubmitProof(SubmitProofRequest) returns (SubmitProofResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_NONE };
  }
  // List the caller's own proofs.
  rpc ListProofs(ListProofsRequest) returns (ListProofsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }

  // ── Handle / escrow (wraps weft's F3a engine) ───────────────────
  // Availability + right-of-first-refusal escrow + self-claim for native
  // handles. Handlers land in weft (a follow-up); this is the contract.
  //
  // Report a native handle's availability + whether it is held for a verified
  // owner.
  rpc GetHandleStatus(GetHandleStatusRequest) returns (GetHandleStatusResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  // Start the 30-day right-of-first-refusal on a held name.
  rpc RequestHeldName(RequestHeldNameRequest) returns (RequestHeldNameResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_NONE };
  }
  // An existing verified owner self-claims their held native name (the
  // existing-user native-claim path the escrow engine's `held_check_in_txn`
  // co-holder branch was built for; weft#456 subject-canonicalization is a
  // handler-side dep, not a proto concern).
  rpc ClaimHandle(ClaimHandleRequest) returns (ClaimHandleResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_NONE };
  }
}

// Namespace kinds in the hosted control plane. `USER` namespaces are
// per-account and auto-created at first sign-in; `ORG` and `TEAM` are
// explicit organisational containers.
enum NamespaceKind {
  NAMESPACE_KIND_UNSPECIFIED = 0;
  NAMESPACE_KIND_USER = 1;
  NAMESPACE_KIND_ORG = 2;
  NAMESPACE_KIND_TEAM = 3;
}

enum SpoolVisibility {
  SPOOL_VISIBILITY_UNSPECIFIED = 0;
  SPOOL_VISIBILITY_PRIVATE = 1;
  SPOOL_VISIBILITY_PUBLIC = 2;
}

enum SpoolStateVisibility {
  SPOOL_STATE_VISIBILITY_UNSPECIFIED = 0;
  SPOOL_STATE_VISIBILITY_PUBLIC = 1;
  SPOOL_STATE_VISIBILITY_INTERNAL = 2;
  SPOOL_STATE_VISIBILITY_PRIVATE = 3;
}

enum SpoolBootstrapKind {
  SPOOL_BOOTSTRAP_KIND_UNSPECIFIED = 0;
  SPOOL_BOOTSTRAP_KIND_EMPTY = 1;
  SPOOL_BOOTSTRAP_KIND_GIT_REMOTE = 2;
  SPOOL_BOOTSTRAP_KIND_TEMPLATE = 3;
}

enum SpoolBootstrapSyncDirection {
  SPOOL_BOOTSTRAP_SYNC_DIRECTION_UNSPECIFIED = 0;
  SPOOL_BOOTSTRAP_SYNC_DIRECTION_PULL = 1;
  SPOOL_BOOTSTRAP_SYNC_DIRECTION_PUSH = 2;
  SPOOL_BOOTSTRAP_SYNC_DIRECTION_BIDI = 3;
}

// Inheritable HOLD-verdict lifecycle policy (weft#481). A state's effective
// lifecycle is the nearest ancestor spool that sets this explicitly (walking
// `parent_spool_id` up); absence (`UNSPECIFIED`) inherits, and the built-in
// root default is `EXPLICIT_SUPERSESSION` — so existing spools get the safe
// behavior with no settings-value migration.
enum SpoolHoldLifecycle {
  SPOOL_HOLD_LIFECYCLE_UNSPECIFIED = 0;             // inherit; root default = EXPLICIT_SUPERSESSION
  SPOOL_HOLD_LIFECYCLE_EXPLICIT_SUPERSESSION = 1;
  SPOOL_HOLD_LIFECYCLE_AUTO_CLEAR_ON_RESUBMIT = 2;
}

enum SpoolWritePolicy {
  SPOOL_WRITE_POLICY_UNSPECIFIED = 0;
  SPOOL_WRITE_POLICY_DEVELOPERS = 1;
  SPOOL_WRITE_POLICY_MAINTAINERS = 2;
  SPOOL_WRITE_POLICY_OWNER_ONLY = 3;
}

enum SpoolChildPolicy {
  SPOOL_CHILD_POLICY_UNSPECIFIED = 0;
  SPOOL_CHILD_POLICY_MAINTAINERS = 1;
  SPOOL_CHILD_POLICY_DEVELOPERS = 2;
  SPOOL_CHILD_POLICY_DISABLED = 3;
}

enum SpoolSyncBehavior {
  SPOOL_SYNC_BEHAVIOR_UNSPECIFIED = 0;
  SPOOL_SYNC_BEHAVIOR_MANUAL = 1;
  SPOOL_SYNC_BEHAVIOR_HEDDLE_START = 2;
  SPOOL_SYNC_BEHAVIOR_HEDDLE_START_WITH_PRESENCE = 3;
}

message SpoolInitialTooling {
  bool readme = 1;
  string license = 2;
  string gitignore = 3;
  string language_preset = 4;
}

message SpoolSettings {
  SpoolVisibility visibility = 1;
  SpoolStateVisibility default_state_visibility = 2;
  SpoolBootstrapKind bootstrap_kind = 3;
  string bootstrap_source = 4;
  SpoolWritePolicy write_policy = 5;
  SpoolChildPolicy child_policy = 6;
  SpoolInitialTooling initial_tooling = 7;
  SpoolSyncBehavior sync_behavior = 8;
  SpoolBootstrapSyncDirection bootstrap_sync_direction = 9;
  string description = 10;
  SpoolHoldLifecycle hold_lifecycle = 11;  // +weft#481: inheritable HOLD lifecycle policy
}

message GetCurrentUserNamespaceRequest {}

message CreateNamespaceRequest {
  NamespaceKind kind = 1;
  string slug = 2;
  string parent_path = 3;
  string display_name = 4;
  SpoolSettings settings = 5;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message UpdateNamespaceRequest {
  string full_path = 1;
  string new_slug = 2;
  string display_name = 3;
  bool clear_display_name = 4;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message SetNamespaceVisibilityRequest {
  string full_path = 1;
  SpoolVisibility visibility = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message DeleteNamespaceRequest {
  string full_path = 1;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message ListSpoolsRequest {
  bool repos_only = 1; // when true, return only content-bearing (repo) spools
}

message CreateRepositoryRequest {
  string namespace_path = 1;
  string slug = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message UpdateRepositoryRequest {
  string full_path = 1;
  string new_slug = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message DeleteRepositoryRequest {
  string full_path = 1;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message ListGrantsRequest {
  string resource = 1;
}

message CreateGrantRequest {
  string subject = 1;
  HostedRole role = 2;
  GrantTargetRef target = 3;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message UpdateGrantRequest {
  string subject = 1;
  HostedRole role = 2;
  GrantTargetRef target = 3;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message DeleteGrantRequest {
  string subject = 1;
  GrantTargetRef target = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message ListActorsRequest {}

message ListWorktreesRequest {}

message HostedNamespace {
  string namespace_id = 1;
  NamespaceKind kind = 2;
  string slug = 3;
  string full_path = 4;
  string parent_id = 5;
  string display_name = 6;
  SpoolSettings settings = 7;
  // Current effective visibility of the namespace's spool. Mirrors
  // `settings.visibility` for top-level reads; populated on every response
  // builder so SetNamespaceVisibility callers see the applied value.
  SpoolVisibility visibility = 8;
}

message HostedRepository {
  string repo_id = 1;
  string namespace_id = 2;
  string slug = 3;
  string path = 4;
  string full_path = 5;
  // Unset when the serving registry has no activity data; populated by weft
  // from the refs/state tables (weft wiring is a separate weft-side change).
  google.protobuf.Timestamp last_activity_at = 6;
}

message SpoolSummary {
  string spool_id = 1;
  string full_path = 2;
  string kind = 3; // UX label only: "namespace" | "repository"/"project" — NEVER structural
  bool is_repo = 4; // capability: content-bearing spool (pushable/pullable)
  // Unset when the serving registry has no activity data; weft computes the
  // value in the registry (weft#457) and populates it in the follow-on handler
  // pass.
  google.protobuf.Timestamp last_activity_at = 5;
}

// ── Unified spool settings (weft#472) ────────────────────────────────────────
// One read + two writes for any spool (namespace or repo), keyed on
// `full_path`. Reuse the existing SpoolSettings / SpoolVisibility / SpoolSummary
// shapes — do not fork them. Handlers land in weft (a follow-up).

// The unified settings-read result: SpoolSummary-style metadata plus the FULL
// SpoolSettings, so Settings + Overview + Repos render from one call. `kind` is
// a UX label only (like SpoolSummary), never structural; `is_repo` is the
// capability flag.
message HostedSpool {
  string spool_id = 1;
  string full_path = 2;
  string kind = 3; // UX label only: "namespace" | "repository" — NEVER structural
  bool is_repo = 4; // capability: content-bearing spool (pushable/pullable)
  // Unset when the serving registry has no activity data (mirrors
  // SpoolSummary.last_activity_at).
  google.protobuf.Timestamp last_activity_at = 5;
  // The full spool settings (visibility, description, write_policy,
  // default_state_visibility, …). Reuses the existing SpoolSettings message.
  SpoolSettings settings = 6;
  // The most recent import job targeting this spool (weft#490). Absent = the
  // spool was never an import target. Lets the repo/overview page render
  // "importing…" / "failed — retry" straight from the GetSpool cold-load, no
  // second RPC and no StreamImportProgress subscription until the user watches.
  ImportJobSummary latest_import_job = 7;
}

// Cold-load summary of a spool's most recent import job (weft#490). Populated
// by the GetSpool handler from the latest `import_jobs` row for the spool,
// gated to the same audience that can already read the spool.
message ImportJobSummary {
  string job_id = 1;
  ImportPhase phase = 2;           // reuses the common.proto enum
  ImportErrorCode error_code = 3;  // set when phase = FAILED; reuses common.proto
  string error_message = 4;        // sanitized
  google.protobuf.Timestamp updated_at = 5;
}

message GetSpoolRequest {
  string full_path = 1;
}

// Unified visibility write (works for repos too). Mirrors
// SetNamespaceVisibilityRequest but keyed on `full_path`.
message SetSpoolVisibilityRequest {
  string full_path = 1;
  SpoolVisibility visibility = 2; // reuses the existing enum
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

// General settings write for any spool (description, etc.). Carries the whole
// SpoolSettings for forward-compat; the server enforces which fields are
// settable (e.g. description). Reuses the existing SpoolSettings message.
message UpdateSpoolSettingsRequest {
  string full_path = 1;
  SpoolSettings settings = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message Bookmark {
  string id = 1;
  // "repo" | "namespace" for the current web UI. Kept as a string so
  // future bookmarkable resource kinds can ship without enum churn.
  string resource_kind = 2;
  string full_path = 3;
  string name = 4;
  string folder = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ListBookmarksRequest {}

message ListBookmarksResponse {
  repeated Bookmark bookmarks = 1;
}

message UpsertBookmarkRequest {
  string resource_kind = 1;
  string full_path = 2;
  string name = 3;
  string folder = 4;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message DeleteBookmarkRequest {
  string resource_kind = 1;
  string full_path = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message HostedGrant {
  string subject = 1;
  HostedRole role = 2;
  GrantTargetRef target = 3;
}

message ActorSummary {
  string session_id = 1;
  string thread = 2;
  optional string path = 3;
  bytes base_state = 4;
  google.protobuf.Timestamp started_at = 5;
  optional string provider = 6;
  optional string model = 7;
  string status = 8;
  optional string heddle_session_id = 9;
  optional string harness = 10;
  optional string thinking_level = 11;
  UsageSummary usage_summary = 12;
  optional google.protobuf.Timestamp last_progress_at = 13;
  optional string report_flush_state = 14;
  optional string client_instance_id = 15;
  optional string attach_reason = 16;
  optional string native_actor_key = 17;
  optional string native_parent_actor_key = 18;
  optional string probe_source = 19;
  optional float probe_confidence = 20;
}

message WorktreeSummary {
  string id = 1;
  string name = 2;
  bytes base_state = 3;
  optional string thread = 4;
  uint32 changes = 5;
  optional string session_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp modified_at = 8;
  bool is_current = 9;
}

message ListActorsResponse {
  repeated ActorSummary actors = 1;
}

message ListWorktreesResponse {
  repeated WorktreeSummary worktrees = 1;
}

// --- Invitations (Track D) -------------------------------------------------

message Invitation {
  string id = 1;
  string email = 2;
  string namespace_path = 3;
  HostedRole role = 4;
  string invited_by = 5;
  google.protobuf.Timestamp created_at = 6; // unix seconds
  google.protobuf.Timestamp expires_at = 7; // 0 if no expiry
  google.protobuf.Timestamp accepted_at = 8; // 0 if pending
  string accepted_by = 9; // "" if pending
  string metadata = 10; // stringified JSON — small, avoids pulling in struct
}

message CreateInvitationRequest {
  string email = 1;
  string namespace_path = 2;
  HostedRole role = 3;
  google.protobuf.Timestamp expires_at = 4; // 0 = no expiry
  string metadata = 5; // optional caller-supplied JSON; pass "{}" if none

  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message ListInvitationsRequest {
  string namespace_path = 1;
  bool include_accepted = 2; // default false = pending only
}

message ListInvitationsResponse {
  repeated Invitation invitations = 1;
}

message RevokeInvitationRequest {
  string id = 1;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

// Members = direct grants + pending invitations for a namespace.
message MemberEntry {
  // Exactly one of these is populated.
  oneof entry {
    Grant grant = 1;
    Invitation invitation = 2;
  }
  message Grant {
    string subject = 1;
    HostedRole role = 2;
    string resource_path = 3;
    string resource_kind = 4; // "namespace" or "repository"
  }
}

message ListMembersRequest {
  string namespace_path = 1;
  bool include_descendants = 2; // include grants on child namespaces + repos
}

message ListMembersResponse {
  repeated MemberEntry entries = 1;
}

message ListSpoolsResponse {
  repeated SpoolSummary spools = 1;
}

message ListGrantsResponse {
  repeated HostedGrant grants = 1;
}

// ── Subject resolution ──────────────────────────────────────────────────────
// Batch subject→display-name resolution. The grant/member UIs hold opaque
// subjects (from HostedGrant.subject / MemberEntry.Grant.subject) and today
// render them raw; this lets a consumer enrich a whole grant/member list in a
// single round trip. Backend impl is a weft follow-up.
message ResolveSubjectsRequest {
  // Opaque subjects, e.g. "user:<uuid>" / "ops-alice".
  repeated string subjects = 1;
}

message ResolveSubjectsResponse {
  repeated ResolvedPrincipal principals = 1;
}

message ResolvedPrincipal {
  // Echo of the requested subject (the join key for the caller).
  string subject = 1;
  // Human display name; empty when unresolved.
  string display_name = 2;
  // Username / handle; empty when unresolved.
  string handle = 3;
  // False when the subject couldn't be resolved (display_name + handle empty).
  bool resolved = 4;

  // ---- Handle system (F0a foundation, weft#438) ----------------------------
  // ADDITIVE. Defined here in F0a; POPULATED by the weft resolve handler in
  // F0b. Until F0b lands these carry proto3 defaults (empty / false), so a
  // consumer that reads them before F0b sees the same "unset" it would for any
  // new field. Every display surface renders from these fields via the single
  // resolveSubjects choke point.

  // The primary handle's canonical textual form — the single token that is
  // BOTH the authoritative text AND the URL path segment: `gh:torvalds`
  // (GitHub), `gitlab.example.com:torvalds` (host-qualified GitLab), or the
  // bare native name `torvalds`. Empty when unresolved.
  string primary_handle = 5;
  // Handle kind for the primary handle: "native" | "github" | "gitlab".
  // Mirrors the weft `handles.kind` column. Empty when unresolved.
  string kind = 6;
  // True when the primary handle is provider-verified (OAuth-verified, or a
  // future git proof). Native self-asserted handles are false.
  bool verified = 7;
  // Short subject-derived discriminator for an UNVERIFIED native handle,
  // rendered Signal-style as `torvalds·a3f9` in trust-sensitive contexts.
  // Empty for verified identities (they render bare). F0b computes it.
  string discriminator = 8;
}

// ── Handle resolution (URL routing, weft#467) ────────────────────────────────
// Resolve a bare handle name to its principal for `/gh:<name>` / `/<name>` /
// `/u:<subject>` routing. Never-claimed → gRPC NotFound (frontend 404);
// tombstoned/renamed-away → `tombstoned = true` (frontend 410 Gone).
message ResolveHandleRequest {
  // Canonical text or bare name, e.g. "gh:torvalds" / "torvalds".
  string name = 1;
}

message ResolveHandleResponse {
  // The resolved principal (reuses ResolvedPrincipal). On a tombstoned name
  // this MAY carry the canonical `/u:<subject>` redirect target when known;
  // otherwise the subject must not appear here.
  ResolvedPrincipal principal = 1;
  // True ⇒ the name existed but was renamed away → frontend serves 410 Gone.
  bool tombstoned = 2;
}

// ============================================================================
// Spool child edges + monorepo resolution + facet history (Spool epic P8a,
// weft#358). ADDITIVE. Message shapes mirror weft's registry return types so
// the P8b handler phase maps 1:1. State/change ids are `bytes` (16-byte
// ChangeId), matching the package-wide wire convention.
// ============================================================================

// Who committed a facet change (audit trail). Mirrors heddle's
// `objects::Attribution { principal, agent: Option<Agent> }` — a human
// principal plus an optional AI agent that performed the change on their
// behalf.
message SpoolPrincipal {
  string name = 1;
  string email = 2;
}

message SpoolAgent {
  string provider = 1;
  string model = 2;
}

message SpoolAttribution {
  SpoolPrincipal principal = 1;
  // Present when an AI agent performed the change on the principal's behalf.
  optional SpoolAgent agent = 2;
}

// Ff/divergence status of a child edge vs the child's latest content state
// (moving-anchored-ff). Mirrors weft `children::ChildEdgeStatus`.
enum ChildEdgeStatus {
  CHILD_EDGE_STATUS_UNSPECIFIED = 0;
  // The edge's anchor already equals the child's latest content state.
  CHILD_EDGE_STATUS_UP_TO_DATE = 1;
  // The child advanced linearly past the anchor (anchor is an ancestor of the
  // child's latest state): the edge can fast-forward to it.
  CHILD_EDGE_STATUS_FAST_FORWARDABLE = 2;
  // The child's history diverged from the anchor (non-ff): the edge does not
  // move; surfaced instead of silently advancing.
  CHILD_EDGE_STATUS_DIVERGED = 3;
  // The child has no content head yet (nothing to advance toward).
  CHILD_EDGE_STATUS_NO_CHILD_HEAD = 4;
}

// One resolved child edge. Mirrors weft `children::ChildEdge`.
message ChildEdge {
  string parent_spool_id = 1;
  string child_spool_id = 2;
  string mount_name = 3;
  // The child content state-id this edge is currently anchored to (16-byte
  // ChangeId).
  bytes anchored_state_id = 4;
  // The child's latest content-facet head, if any (absent = child has no
  // content head yet).
  optional bytes child_head = 5;
  // Moving-anchored-ff status of the anchor vs the child head.
  ChildEdgeStatus status = 6;
}

message AttachChildRequest {
  // The parent spool the child is mounted under.
  string parent_path = 1;
  // The child spool to attach.
  string child_path = 2;
  // The mount name of the child inside the parent (the SPOOLLINK entry name).
  string mount_name = 3;
}

message DetachChildRequest {
  string parent_path = 1;
  string mount_name = 2;
}

message DetachChildResponse {
  // True if an edge was present and removed; false if no such mount existed.
  // Mirrors weft `children::detach_child_tx` -> bool.
  bool removed = 1;
}

message ListChildrenRequest {
  string parent_path = 1;
}

message ListChildrenResponse {
  repeated ChildEdge children = 1;
}

// Why a child edge in a resolved monorepo was NOT descended into. A resolved
// tree is always the caller's coherent visible slice: an omitted child is
// recorded, never an error. Mirrors weft `children::EdgeSkip`.
enum EdgeSkip {
  EDGE_SKIP_UNSPECIFIED = 0;
  // The caller cannot read the child spool (per-child visibility chain-walk
  // failed): the edge is withheld from the caller's slice.
  EDGE_SKIP_UNREADABLE = 1;
  // The child was already visited on this walk (cycle guard, e.g. A->B->A):
  // recorded but not re-descended, so the walk terminates.
  EDGE_SKIP_CYCLE = 2;
  // The child sits at MONOREPO_MAX_DEPTH: recorded but not descended.
  EDGE_SKIP_DEPTH_BOUNDED = 3;
}

// One edge in a resolved monorepo tree: the anchored child + either the
// recursively-resolved subtree (descended) or the reason it was not descended.
// Mirrors weft `children::MonorepoEdge`.
message MonorepoEdge {
  // The mount name of this child inside its parent (the SPOOLLINK entry name).
  string mount_name = 1;
  // The child spool this edge points at.
  string child_spool_id = 2;
  // The child content state-id the edge is anchored to (moving-anchored-ff
  // resolved — the state the caller would materialize for this child).
  bytes anchored_state_id = 3;
  // The child's current content head + ff/diverged status vs the anchor
  // (reused from the ChildEdge resolution, not re-derived).
  optional bytes child_head = 4;
  ChildEdgeStatus status = 5;
  // The recursively-resolved child subtree when descended; absent (with a
  // `skipped` reason) when the edge was withheld/bounded/cycle-guarded.
  optional MonorepoNode subtree = 6;
  // The reason the edge was not descended; absent when `subtree` is present.
  optional EdgeSkip skipped = 7;
}

// One spool in a resolved monorepo tree: its content state at the resolved
// anchor plus its visible child edges. The caller reconstructs the whole
// monorepo by materializing each node's content at `content_state` and
// mounting each edge's subtree under its `mount_name`. Mirrors weft
// `children::MonorepoNode`.
message MonorepoNode {
  string spool_id = 1;
  // The content-facet state this spool is resolved at (absent = no content
  // head). For the ROOT this is its own content head; for a descendant it is
  // the anchored state the PARENT's edge pins.
  optional bytes content_state = 2;
  // The visible child edges of this spool (unreadable children are recorded
  // with EDGE_SKIP_UNREADABLE, not silently dropped).
  repeated MonorepoEdge edges = 3;
}

message ResolveMonorepoRequest {
  string root_path = 1;
  // Optional recursion depth bound; server clamps to MONOREPO_MAX_DEPTH.
  optional uint32 max_depth = 2;
}

// One entry in a spool's governance-facet history — a governance commit and
// the document it captured. Newest-first. Mirrors weft
// `governance::GovernanceHistoryEntry`.
message GovernanceHistoryEntry {
  // The governance-facet commit id (16-byte ChangeId).
  bytes change_id = 1;
  // Access-gating visibility (`public`/`private`) as of this state.
  string visibility = 2;
  // The full non-visibility governance knobs (write_policy, child_policy,
  // bootstrap_*, initial_tooling, description, ...), captured verbatim as a
  // JSON string (weft `GovernanceDocument.settings: serde_json::Value`).
  string settings_json = 3;
  // Who committed this governance change (audit trail).
  SpoolAttribution attribution = 4;
  // When the governance change was committed.
  google.protobuf.Timestamp committed_at = 5;
}

message GetGovernanceHistoryRequest {
  string spool_path = 1;
  // Max entries to walk (server default when unset/0).
  optional uint32 limit = 2;
}

message GetGovernanceHistoryResponse {
  repeated GovernanceHistoryEntry entries = 1;
}

// One grant record captured in a membership document — a `(subject, role)`
// pair keyed on the immutable `subject_user_id` UUID. Mirrors weft
// `membership::MembershipGrant`.
message MembershipGrant {
  // The immutable `users.id` UUID this grant is keyed on (the security key).
  string subject_user_id = 1;
  // The handle as it was at commit time (display/lookup only, not a key).
  string subject = 2;
  // The role held, as the on-wire lowercase token
  // (`reader`/`developer`/`maintainer`/`admin`/`owner`).
  string role = 3;
}

// One entry in a spool's membership-facet history — a membership commit and
// the document (full grant set) it captured. Newest-first. Mirrors weft
// `membership::MembershipHistoryEntry`.
message MembershipHistoryEntry {
  // The membership-facet commit id (16-byte ChangeId).
  bytes change_id = 1;
  // Every grant held on the spool as of this state (weft
  // `MembershipDocument.grants`).
  repeated MembershipGrant grants = 2;
  // Who committed this membership change (audit trail).
  SpoolAttribution attribution = 3;
  // When the membership change was committed.
  google.protobuf.Timestamp committed_at = 4;
}

message GetMembershipHistoryRequest {
  string spool_path = 1;
  // Max entries to walk (server default when unset/0).
  optional uint32 limit = 2;
}

message GetMembershipHistoryResponse {
  repeated MembershipHistoryEntry entries = 1;
}

// ============================================================================
// Git-native identity proofs (Prove; wraps weft's F1a engine). ADDITIVE.
// A caller proves control of an external-host repo by publishing a marker line
// to a well-known path, then submitting the challenge for verification.
// ============================================================================

// Verification state of a git-native proof. Namespaced per the file's enum
// convention.
enum ProofStatus {
  PROOF_STATUS_UNSPECIFIED = 0;
  // The challenge has been requested but not yet successfully verified.
  PROOF_STATUS_PENDING = 1;
  // The marker line was found and verified.
  PROOF_STATUS_VERIFIED = 2;
  // Verification ran but failed (marker missing/mismatched).
  PROOF_STATUS_FAILED = 3;
}

message RequestProofChallengeRequest {
  // The external host the repo lives on, e.g. "github.com".
  string host = 1;
  // The repo the caller will publish the proof to.
  string repo = 2;
}

message RequestProofChallengeResponse {
  // Opaque id for the started challenge; echoed back on SubmitProof.
  string challenge_id = 1;
  // The exact line to publish, e.g. `heddle-proof: <subject> <challenge>`.
  string marker_line = 2;
  // The path to publish the marker at, e.g. `.well-known/heddle`.
  string well_known_path = 3;
}

message SubmitProofRequest {
  string challenge_id = 1;
}

message SubmitProofResponse {
  ProofStatus status = 1;
  // Human-readable detail (failure reason, or a confirmation note).
  string detail = 2;
}

message ListProofsRequest {}

// One of the caller's own proofs.
message ProofSummary {
  string host = 1;
  string repo = 2;
  ProofStatus status = 3;
  // When the proof was verified; unset while pending/failed.
  google.protobuf.Timestamp verified_at = 4;
}

message ListProofsResponse {
  repeated ProofSummary proofs = 1;
}

// ============================================================================
// Handle / escrow (wraps weft's F3a engine). ADDITIVE. Availability lookup +
// right-of-first-refusal escrow + verified-owner self-claim for native handles.
// ============================================================================

// Availability of a native handle. Namespaced per the file's enum convention.
enum HandleAvailability {
  HANDLE_AVAILABILITY_UNSPECIFIED = 0;
  // Free to claim.
  HANDLE_AVAILABILITY_AVAILABLE = 1;
  // Held in escrow for a verified owner (right-of-first-refusal window).
  HANDLE_AVAILABILITY_HELD = 2;
  // Already claimed by another account.
  HANDLE_AVAILABILITY_TAKEN = 3;
  // Reserved (system/policy).
  HANDLE_AVAILABILITY_RESERVED = 4;
  // Withheld because it is confusable with an existing handle.
  HANDLE_AVAILABILITY_CONFUSABLE = 5;
}

message GetHandleStatusRequest {
  string name = 1;
}

message GetHandleStatusResponse {
  HandleAvailability availability = 1;
  // True when the name is held in escrow for a verified owner (co-holder).
  bool held_for_verified_owner = 2;
}

message RequestHeldNameRequest {
  string name = 1;
}

message RequestHeldNameResponse {
  // Deadline of the 30-day right-of-first-refusal window.
  google.protobuf.Timestamp rfr_deadline = 1;
}

message ClaimHandleRequest {
  string name = 1;
}

message ClaimHandleResponse {
  // True when the claim succeeded.
  bool claimed = 1;
  // The canonical form of the claimed handle.
  string canonical_handle = 2;
}
