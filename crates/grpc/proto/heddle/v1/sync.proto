syntax = "proto3";

package heddle.v1;

import "heddle/v1/options.proto";

import "heddle/v1/common.proto";
import "heddle/v1/threads.proto";

service RepoSyncService {
  rpc ListRefs(ListRefsRequest) returns (ListRefsResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
  rpc UpdateRef(UpdateRefRequest) returns (UpdateRefResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc Push(stream PushMessage) returns (stream PushMessage) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc Pull(stream PullMessage) returns (stream PullMessage) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_TRANSIENT_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
}

message ListRefsRequest {
  string repo_path = 1;
}

message ListRefsResponse {
  string head_thread = 1;
  bytes head_state = 2;
  repeated RefEntry refs = 3;
}

message UpdateRefRequest {
  string repo_path = 1;
  string name = 2;
  bool is_thread = 3;
  bool force = 4;
  string old_value = 5;
  string new_value = 6;
  ThreadMetadata thread_metadata = 7;
  // Explicit two-lane revision addresses. Native callers should send
  // `heddle:<state_id>` here; git-overlay callers send `git:<commit_oid>`.
  // `old_value` / `new_value` remain populated for Heddle-native refs.
  string old_revision_address = 8;
  string new_revision_address = 9;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message UpdateRefResponse {
  bool success = 1;
  string old_value = 2;
  string error = 3;
  string old_revision_address = 4;
}

enum TransportMode {
  TRANSPORT_MODE_UNSPECIFIED = 0;
  // Native pack is the steady-state sync transport for hosted repo pull/push.
  TRANSPORT_MODE_NATIVE_PACK = 1;
}

enum ObjectAvailabilityStatus {
  OBJECT_AVAILABILITY_STATUS_UNSPECIFIED = 0;
  OBJECT_AVAILABILITY_STATUS_PRESENT = 1;
  OBJECT_AVAILABILITY_STATUS_MISSING = 2;
  OBJECT_AVAILABILITY_STATUS_RESUMABLE = 3;
  OBJECT_AVAILABILITY_STATUS_LAZY = 4;
}

enum PartialFetchStatus {
  PARTIAL_FETCH_STATUS_UNSPECIFIED = 0;
  PARTIAL_FETCH_STATUS_DISABLED = 1;
  PARTIAL_FETCH_STATUS_ENABLED = 2;
  PARTIAL_FETCH_STATUS_REQUIRED = 3;
}

message TransferCheckpoint {
  string transfer_id = 1;
  TransportMode transport_mode = 2;
  uint64 resume_offset = 3;
  uint32 chunk_index = 4;
  bytes checkpoint = 5;
  bool is_complete = 6;
}

message ObjectDescriptor {
  string id = 1;
  string object_type = 2;
  ObjectAvailabilityStatus availability_status = 3;
  string availability_note = 4;
}

message PushRequest {
  string repo_path = 1;
  string local_state = 2;
  string target_thread = 3;
  bool create_thread = 4;
  bool force = 5;
  repeated ObjectDescriptor objects = 6;
  TransferCheckpoint transfer = 7;
  PartialFetchStatus partial_fetch_status = 8;
  bool allow_partial_fetch = 9;
  ThreadMetadata thread_metadata = 10;
  // Explicit revision being published. Native repos use `heddle:<state_id>`;
  // git-overlay repos use `git:<commit_oid>` and stream Git objects on the Git
  // lane rather than importing the commit as a Heddle state.
  string local_revision_address = 11;
  // Idempotency on the stream-opening message. The PushMessage
  // envelope itself isn't the operation — PushRequest is.
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message PushReady {
  string remote_head = 1;
  repeated ObjectDescriptor have_objects = 2;
  repeated ObjectDescriptor want_objects = 3;
  TransferCheckpoint transfer = 4;
  PartialFetchStatus partial_fetch_status = 5;
  repeated ObjectDescriptor missing_objects = 6;
  string remote_revision_address = 7;
}

// Legacy object-by-object chunking is no longer used for normal repo sync.
// The schema stays here only for narrow, non-steady-state object transfer paths.
message ObjectChunk {
  string id = 1;
  string object_type = 2;
  bytes data = 3;
  bool is_delta = 4;
  TransferCheckpoint transfer = 5;
  uint32 chunk_length = 6;
  bool is_final_chunk = 7;
}

enum PackStreamKind {
  PACK_STREAM_KIND_UNSPECIFIED = 0;
  PACK_STREAM_KIND_PACK = 1;
  PACK_STREAM_KIND_INDEX = 2;
}

message PackChunk {
  PackStreamKind stream_kind = 1;
  bytes data = 2;
  TransferCheckpoint transfer = 3;
  uint32 chunk_length = 4;
  bool is_final_chunk = 5;
}

message PushComplete {
  bool success = 1;
  string new_state = 2;
  string error = 3;
  TransferCheckpoint transfer = 4;
  string new_revision_address = 5;
}

// Out-of-pack transport for redaction sidecars. Sidecars live
// structurally outside `.heddle/objects/` (so GC can't reach them)
// and therefore can't ride the native-pack object channel. The
// sender emits one `RedactionTransfer` per blob hash with an active
// redaction in the state closure; the receiver routes through
// `Repository::accept_wire_redactions` for signature + trust-list
// verification.
//
// `blob_hash` is the hex-encoded ContentHash of the *redacted blob*
// (the redactions store is keyed by that hash, not by the
// redaction-record content hash).
// `redactions_blob` is the rmp-encoded `RedactionsBlob` byte payload
// — byte-identical to what `Repository::put_redaction` wrote on the
// sender's disk.
message RedactionTransfer {
  string blob_hash = 1;
  bytes redactions_blob = 2;
}

// Out-of-pack transport for state-visibility sidecars. State visibility
// records live outside `.heddle/objects/` and are keyed by the state id
// whose audience tier they declare.
//
// `state_id` is the hex-encoded ChangeId of the state.
// `state_visibility_blob` is the rmp-encoded `StateVisibilityBlob` byte
// payload.
message StateVisibilityTransfer {
  string state_id = 1;
  bytes state_visibility_blob = 2;
}

enum GitRefKind {
  GIT_REF_KIND_UNSPECIFIED = 0;
  GIT_REF_KIND_BRANCH = 1;
  GIT_REF_KIND_TAG = 2;
  GIT_REF_KIND_NOTE = 3;
  GIT_REF_KIND_OTHER = 4;
}

message GitPackTransfer {
  string transfer_id = 1;
  uint64 offset = 2;
  uint32 chunk_index = 3;
  bool is_final_chunk = 4;
  uint64 pack_size = 5;
  bytes pack_chunk = 6;
  bytes pack_id = 7;
}

message GitRefUpdateTransfer {
  string name = 1;
  GitRefKind kind = 2;
  bytes target_oid = 3;
  bytes peeled_oid = 4;
  bool expected_missing = 5;
  bytes expected_target_oid = 6;
  GitCheckpointTransfer checkpoint = 7;
}

message GitCheckpointTransfer {
  bytes heddle_state_id = 1;
  bytes git_commit_oid = 2;
  string thread = 3;
  string metadata_json = 4;
}

message GitLaneTransfer {
  oneof body {
    GitPackTransfer pack = 1;
    GitRefUpdateTransfer ref_update = 2;
    GitCheckpointTransfer checkpoint = 3;
  }
}

message PushMessage {
  oneof body {
    PushRequest request = 1;
    PushReady ready = 2;
    PackChunk pack = 3;
    PushComplete complete = 4;
    RedactionTransfer redaction = 5;
    StateVisibilityTransfer state_visibility = 6;
    GitLaneTransfer git_lane = 8;
  }
}

message PullRequest {
  string repo_path = 1;
  string remote_thread = 2;
  string local_thread = 3;
  string target_state = 4;
  uint32 depth = 5;
  repeated string exclude_states = 6;
  TransferCheckpoint transfer = 7;
  PartialFetchStatus partial_fetch_status = 8;
  bool allow_partial_fetch = 9;
  bool fresh_full_pull = 10;
  string target_revision_address = 11;
  // Idempotency on the stream-opening message. The PullMessage
  // envelope itself isn't the operation — PullRequest is.
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message PullReady {
  string remote_state = 1;
  repeated ObjectDescriptor objects_to_fetch = 2;
  TransferCheckpoint transfer = 3;
  PartialFetchStatus partial_fetch_status = 4;
  repeated ObjectDescriptor missing_objects = 5;
  bool full_closure_available = 6;
  uint32 object_count = 7;
  string remote_revision_address = 8;
}

message WantObjects {
  repeated ObjectDescriptor objects = 1;
  TransferCheckpoint transfer = 2;
  bool want_full_closure = 3;
}

message PullComplete {
  bool success = 1;
  string new_state = 2;
  string error = 3;
  TransferCheckpoint transfer = 4;
  string new_revision_address = 5;
}

message PullMessage {
  oneof body {
    PullRequest request = 1;
    PullReady ready = 2;
    WantObjects want = 3;
    PackChunk pack = 4;
    PullComplete complete = 5;
    RedactionTransfer redaction = 6;
    StateVisibilityTransfer state_visibility = 7;
    GitLaneTransfer git_lane = 8;
  }
}
