syntax = "proto3";

package heddle.v1;

import "heddle/v1/options.proto";

import "google/protobuf/timestamp.proto";

// Transactions buffer multiple state-changing operations and apply
// them atomically on commit.
service TransactionService {
  rpc BeginTransaction(BeginTransactionRequest) returns (BeginTransactionResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc CommitTransaction(CommitTransactionRequest) returns (CommitTransactionResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc AbortTransaction(AbortTransactionRequest) returns (AbortTransactionResponse) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_DURABLE_WRITE deduplication: RPC_DEDUPLICATION_CLIENT_OPERATION_ID };
  }
  rpc GetTransactionStatus(GetTransactionStatusRequest) returns (TransactionStatus) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
}

message BeginTransactionRequest {
  string repo_path = 1;
  string thread = 2;
  string message = 3;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message BeginTransactionResponse {
  string transaction_id = 1;
  google.protobuf.Timestamp started_at = 2;
}

message CommitTransactionRequest {
  string repo_path = 1;
  string transaction_id = 2;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message CommitTransactionResponse {
  bytes state_id = 1;
  uint32 op_count = 2;
}

message AbortTransactionRequest {
  string repo_path = 1;
  string transaction_id = 2;
  string reason = 3;
  string client_operation_id = 15 [(heddle.v1.idempotency_key) = true];
}

message AbortTransactionResponse {
  bool aborted = 1;
}

message GetTransactionStatusRequest {
  string repo_path = 1;
  string transaction_id = 2;
}

message TransactionStatus {
  string transaction_id = 1;
  // "active" | "committed" | "aborted"
  string state = 2;
  google.protobuf.Timestamp started_at = 3;
  uint32 buffered_ops = 4;
}
