  string id = 1;
  // True for the session this RPC was invoked on, so the UI can
  // mark it "Current" and disable the revoke button (revoking
  // yourself is just logout — the dedicated logout flow handles
  // cookie cleanup correctly).
  bool is_current = 2;
  // Captured at issue time. Surfaced in the device list as a
  // human-readable string ("Chrome on macOS", "Safari on iPhone").
  // The web layer parses to that shape for display; the raw UA
  // header is what's stored.
  string user_agent = 3;
  // Captured at issue time. Empty string when unknown.
  string ip = 4;
  google.protobuf.Timestamp issued_at = 5;
  google.protobuf.Timestamp expires_at = 6;
