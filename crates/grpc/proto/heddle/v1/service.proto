  string id = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

// ── Thread policies (branch protection) ─────────────────────────────

message ThreadPolicy {
  string id = 1;
  string repo_path = 2;
  // Glob pattern: "main", "release/*", "*", etc.
  string target_thread_pattern = 3;
  // 'merge' | 'force_push' | 'complete'
  string gated_action = 4;
  // Flat-role requirement. `required_role` is one of
  // 'reader' | 'developer' | 'maintainer' | 'admin' | 'owner'.
  // When `required_approvals` == 0, the flat-role requirement is
  // skipped (only group-based requirements apply).
  uint32 required_approvals = 5;
  HostedRole required_role = 6;
  // CODEOWNERS-style: policy fires only when the diff intersects
  // one of these globs. Empty = applies to every change.
  repeated string required_paths = 7;
  // Approver may not be the author of any state on the source thread.
  // Only enforceable when the merge call passes `author_user_id`.
  bool forbid_author_approval = 8;
  bool stale_on_update = 9;
  // Wall-clock approval expiry; 0 = no expiry.
  google.protobuf.Duration approval_ttl_secs = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message PolicyGroupRequirement {
  string id = 1;
  string policy_id = 2;
  string group_id = 3;
  uint32 required_approvals = 4;
  // Conditional trigger: requirement applies only when diff
  // intersects one of these globs. Empty = always applies.
  repeated string only_if_paths_match = 5;
}

message CreateThreadPolicyRequest {
  string repo_path = 1;
  string target_thread_pattern = 2;
  string gated_action = 3;
  uint32 required_approvals = 4; // 0 = skip flat-role check
  HostedRole required_role = 5;
  repeated string required_paths = 6;
  bool forbid_author_approval = 7;
  bool stale_on_update = 8;
  google.protobuf.Duration approval_ttl_secs = 9; // 0 = no expiry
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message ListThreadPoliciesRequest {
  string repo_path = 1;
}

message ListThreadPoliciesResponse {
  repeated ThreadPolicy policies = 1;
  // Group requirements keyed by policy id.
  map<string, PolicyGroupRequirements> requirements_by_policy = 2;
}

message PolicyGroupRequirements {
  repeated PolicyGroupRequirement requirements = 1;
}

message DeleteThreadPolicyRequest {
  string id = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message AddPolicyGroupRequirementRequest {
  string policy_id = 1;
  string group_id = 2;
  uint32 required_approvals = 3;
  repeated string only_if_paths_match = 4;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message RemovePolicyGroupRequirementRequest {
  string id = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

// ── Thread merge approvals ──────────────────────────────────────────
//
// An approval is a record that a particular user signed off on a
// particular (source_thread → target_thread) merge at a specific
// `source_state` (the change_id at the source's head). The merge
// gate consumes these rows and matches them against every policy
// whose target glob matches `target_thread`.

message ThreadApproval {
  string id = 1;
  string repo_path = 2;
  string source_thread = 3;
  string target_thread = 4;
  // Change id at source thread's head when this approval was
  // recorded. Used for stale-on-update detection.
  bytes source_state = 5;
  string approver_user_id = 6;
  // Biscuit session id of the approver — full audit attribution.
  string approver_sid = 7;
  string note = 8;
  google.protobuf.Timestamp approved_at = 9;
  // 0 when the policy did not specify a TTL.
  google.protobuf.Timestamp expires_at = 10;
}

message ApproveThreadRequest {
  string repo_path = 1;
  string source_thread = 2;
  string target_thread = 3;
  bytes source_state = 4;
  string note = 5;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message RevokeApprovalRequest {
  string id = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message ListThreadApprovalsRequest {
  string repo_path = 1;
  string source_thread = 2;
  string target_thread = 3;
}

message ListThreadApprovalsResponse {
  repeated ThreadApproval approvals = 1;
}

// Eligibility check: caller asks "can <source> merge into <target>
// at <source_state>?" given the file paths the diff touches. The
// server runs every matching policy and reports satisfied vs unmet
// requirements without performing the merge.

message CheckMergeEligibilityRequest {
  string repo_path = 1;
  string source_thread = 2;
  string target_thread = 3;
  bytes source_state = 4;
  // 'merge' | 'force_push' | 'complete'. Defaults to 'merge' when empty.
  string gated_action = 5;
  // Paths touched by the source thread relative to the diff against
  // target. Empty list = "we don't know" — every path-conditional
  // requirement is treated as triggered (fail-closed).
  repeated string changed_paths = 6;
  // Optional: the user_id of the change author. Used for
  // forbid_author_approval. Empty = unknown / not enforced.
  string author_user_id = 7;
}

message CheckMergeEligibilityResponse {
  bool allowed = 1;
  // Each unmet requirement, with a human-readable reason. Empty
  // when `allowed = true`.
  repeated UnmetRequirement unmet = 2;
  // Approvals the gate considered valid (matching change_id, not
  // expired, not self-approval when forbidden, etc.).
  repeated ThreadApproval valid_approvals = 3;
}

message UnmetRequirement {
  // Policy id this requirement came from.
  string policy_id = 1;
  // 'flat_role' | 'group' — which kind of requirement is unmet.
  string kind = 2;
  // For 'group' requirements, the group id; empty otherwise.
  string group_id = 3;
  // Human-readable explanation: "needs 2 maintainer approvals on
  // org/acme/heddle/threads/main; have 1".
  string reason = 4;
  uint32 needed = 5;
  uint32 have = 6;
}

// =====================================================================
// Foundation services for the Review and Agent-First CLI epics.
//
// Idempotency contract: every state-changing RPC defined below carries
// `string client_operation_id = 100` (UUID v4 string, optional). When
// the server sees the same id twice with the same request body it
// returns the original outcome bit-identical; the same id with a
// different body returns FAILED_PRECONDITION. New state-changing RPCs
// added to existing services should reserve tag 100 for the same field
// going forward — the value of 100 is grep-able and leaves room for
// pre-existing fields below it.
// =====================================================================

// State review surface. Distinct from the GitHub-PR-focused ReviewService
// above. Ships the review payload that powers both the CLI's
// `heddle review show` and the web's state-review route.
service StateReviewService {
  rpc GetReviewPayload(GetReviewPayloadRequest) returns (ReviewPayload);
  rpc SignState(SignStateRequest) returns (SignStateResponse);
  rpc ListSignatures(ListSignaturesRequest) returns (ListSignaturesResponse);
}

message GetReviewPayloadRequest {
  string repo_path = 1;
  bytes state_id = 2;
  // When true, the response includes `all_signals` populated.
  bool include_all_signals = 3;
}

message ReviewPayload {
  bytes state_id = 1;
  ReviewSummary summary = 2;
  // Agent-authored narrative captured at snapshot time. Empty when
  // the state has no agent attribution.
  string agent_narrative = 3;
  ReadingOrderPartition partition = 4;
  repeated RiskSignal in_budget_signals = 5;
  // Full set of fired signals; only populated when the request set
  // `include_all_signals = true`.
  repeated RiskSignal all_signals = 6;
  uint32 tick_budget = 7;
  repeated AnchoredDiscussion discussions = 8;
  repeated MergeRequirement merge_requirements = 9;
  SigningFooter signing_footer = 10;
}

message ReviewSummary {
  string headline = 1;
  uint32 files_changed = 2;
  uint32 added_lines = 3;
  uint32 removed_lines = 4;
  uint32 in_budget_signal_count = 5;
  uint32 hidden_signal_count = 6;
}

message ReadingOrderPartition {
  repeated PathSymbolRef structural = 1;
  repeated PathSymbolRef consequence = 2;
  repeated PathSymbolRef tests_and_docs = 3;
}

message PathSymbolRef {
  string file = 1;
  string symbol = 2;
}

message RiskSignal {
  // Snake-case wire vocabulary matching `objects::object::RiskSignalKind`.
  string kind = 1;
  SignalAnchor anchor = 2;
  string reason = 3;
  string producer_module = 4;
  uint32 producer_version = 5;
  google.protobuf.Timestamp computed_at = 6;
  // Render-time tier — `visible` or `hidden`. Set by the server-side
  // budgeter so clients render without re-budgeting.
  string visibility = 7;
}

message SignalAnchor {
  string file = 1;
  string symbol = 2;
  // Empty when the signal is file-level rather than symbol-level.
  uint32 start_line = 3;
  uint32 end_line = 4;
}

message AnchoredDiscussion {
  string id = 1;
  PathSymbolRef anchor = 2;
  bytes opened_against_state = 3;
  google.protobuf.Timestamp opened_at = 4;
  repeated DiscussionTurn turns = 5;
  DiscussionResolution resolution = 6;
  bool body_changed_since_open = 7;
  bool orphaned = 8;
  string visibility = 9;
}

message DiscussionTurn {
  string author_name = 1;
  string author_email = 2;
  string body = 3;
  google.protobuf.Timestamp posted_at = 4;
}

// Resolution state of a discussion. `Open` means unresolved; the
// other three variants carry the artifact that closed it. Discussions
// progress strictly Open → resolved/dismissed; the oneof guarantees
// exactly one shape on the wire.
message DiscussionResolution {
  oneof state {
    Open open = 1;
    ResolvedIntoAnnotation into_annotation = 2;
    ResolvedByEdit by_edit = 3;
    Dismissed dismissed = 4;
  }

  message Open {}
  message ResolvedIntoAnnotation {
    string annotation_id = 1;
  }
  message ResolvedByEdit {
    bytes state_id = 1;
  }
  message Dismissed {
    string reason = 1;
  }
}

message MergeRequirement {
  string description = 1;
  bool satisfied = 2;
}

message SigningFooter {
  // Permitted review kinds for this state — server filters out kinds
  // that don't apply (e.g. AGENT_CO_REVIEW hidden when caller isn't
  // an agent).
  repeated ReviewKind available_kinds = 1;
}

message SignStateRequest {
  string repo_path = 1;
  bytes state_id = 2;
  ReviewKind kind = 3;
  ReviewScope scope = 4;
  string justification = 5;
  string algorithm = 6;
  bytes public_key = 7;
  // Raw signature bytes over the canonical signing payload.
  bytes signature = 8;
  // Unix timestamp (seconds) the client signed at. The server rejects values
  // skewed more than `SIGN_TIMESTAMP_SKEW_SECS` from its own clock so the
  // signature can be reproduced and verified deterministically.
  google.protobuf.Timestamp signed_at = 9;
  string client_operation_id = 15;
}

// Scope of a review signature — either the whole change or a list of
// individual symbols. The oneof guarantees exactly one shape on the
// wire.
message ReviewScope {
  oneof scope {
    WholeChange whole_change = 1;
    SymbolList symbols = 2;
  }
  message WholeChange {}
  message SymbolList {
    repeated PathSymbolRef symbols = 1;
  }
}

message SignStateResponse {
  string signature_id = 1;
  bytes state_id = 2;
}

message ListSignaturesRequest {
  string repo_path = 1;
  bytes state_id = 2;
}

message ListSignaturesResponse {
  repeated ReviewSignature signatures = 1;
}

message ReviewSignature {
  string signature_id = 1;
  string actor_name = 2;
  string actor_email = 3;
  ReviewKind kind = 4;
  ReviewScope scope = 5;
  string justification = 6;
  google.protobuf.Timestamp signed_at = 7;
  string algorithm = 8;
  bytes public_key = 9;
  bytes signature = 10;
}

// Discussion CRUD over the per-state `Discussion` blob.
service DiscussionService {
  rpc OpenDiscussion(OpenDiscussionRequest) returns (Discussion);
  rpc AppendTurn(AppendTurnRequest) returns (Discussion);
  rpc ResolveDiscussion(ResolveDiscussionRequest) returns (Discussion);
  rpc ListByState(ListDiscussionsByStateRequest) returns (ListDiscussionsResponse);
  rpc ListBySymbol(ListDiscussionsBySymbolRequest) returns (ListDiscussionsResponse);
  rpc GetDiscussion(GetDiscussionRequest) returns (Discussion);
}

message OpenDiscussionRequest {
  string repo_path = 1;
  bytes state_id = 2;
  PathSymbolRef anchor = 3;
  string body = 4;
  // Optional override; server defaults to the namespace policy.
  string visibility = 5;
  string thread_ref = 6;
  string client_operation_id = 15;
}

message AppendTurnRequest {
  string repo_path = 1;
  string discussion_id = 2;
  string body = 3;
  string client_operation_id = 15;
}

message ResolveDiscussionRequest {
  string repo_path = 1;
  string discussion_id = 2;
  // The resolution mode is a strict oneof — exactly one of the three
  // shapes lands per request, and each shape carries the fields that
  // are meaningful for it.
  oneof resolution {
    ResolveIntoAnnotation into_annotation = 3;
    ResolveByEdit by_edit = 4;
    ResolveDismissed dismissed = 5;
  }
  string client_operation_id = 15;

  message ResolveIntoAnnotation {
    ContextAnnotationKind kind = 1;
    string content = 2;
    repeated string tags = 3;
  }
  message ResolveByEdit {
    // Optional pin to the state where the resolving edit landed; empty
    // means "use the discussion's anchor state".
    bytes state_id = 1;
  }
  message ResolveDismissed {
    string reason = 1;
  }
}

message Discussion {
  string id = 1;
  PathSymbolRef anchor = 2;
  bytes opened_against_state = 3;
  google.protobuf.Timestamp opened_at = 4;
  string thread_ref = 5;
  repeated DiscussionTurn turns = 6;
  DiscussionResolution resolution = 7;
  bool body_changed_since_open = 8;
  bool orphaned = 9;
  string visibility = 10;
  string resolved_annotation_id = 11;
}

message ListDiscussionsByStateRequest {
  string repo_path = 1;
  bytes state_id = 2;
  // "open" | "resolved" | "all" | "orphaned"
  string status = 3;
}

message ListDiscussionsBySymbolRequest {
  string repo_path = 1;
  PathSymbolRef anchor = 2;
  string status = 3;
}

message ListDiscussionsResponse {
  repeated Discussion discussions = 1;
}

message GetDiscussionRequest {
  string repo_path = 1;
  string discussion_id = 2;
}

// Risk signal computation + repo-level health.
service SignalService {
  rpc ComputeStateSignals(ComputeStateSignalsRequest) returns (ComputeStateSignalsResponse);
  rpc GetRepoSignalHealth(GetRepoSignalHealthRequest) returns (RepoSignalHealthReport);
  rpc SubscribeSignalUpdates(SubscribeSignalUpdatesRequest) returns (stream SignalUpdate);
}

message ComputeStateSignalsRequest {
  string repo_path = 1;
  bytes state_id = 2;
  // Optional prior state to diff against; server defaults to the
  // state's first parent.
  bytes prior_state_id = 3;
}

message ComputeStateSignalsResponse {
  repeated RiskSignal signals = 1;
  uint32 tick_budget = 2;
}

message GetRepoSignalHealthRequest {
  string repo_path = 1;
  // Number of recent states to include in the rolling window. Server
  // applies a sane default when zero.
  uint32 window_states = 2;
}

message RepoSignalHealthReport {
  repeated SignalHealthEntry entries = 1;
  uint32 window_states = 2;
}

message SignalHealthEntry {
  string module_id = 1;
  float fire_rate = 2;
  bool warn = 3;
}

message SubscribeSignalUpdatesRequest {
  string repo_path = 1;
}

message SignalUpdate {
  bytes state_id = 1;
  repeated RiskSignal signals = 2;
}

// Structured query over the operation log + cross-cutting index.
service OperationLogQueryService {
  rpc QueryOperations(QueryOperationsRequest) returns (QueryOperationsResponse);
  rpc StreamOperations(StreamOperationsRequest) returns (stream OperationHit);
}

message QueryOperationsRequest {
  string repo_path = 1;
  string actor = 2;
  string symbol = 3;
  string signal_kind = 4;
  string thread = 5;
  repeated string verbs = 6;
  int64 since_secs = 7;
  int64 until_secs = 8;
  uint32 limit = 9;
  bool include_checkpoints = 10;
}

message QueryOperationsResponse {
  repeated OperationHit hits = 1;
}

message OperationHit {
  uint64 seq = 1;
  int64 timestamp_secs = 2;
  string verb = 3;
  string actor_email = 4;
  string operation_id = 5;
  string thread = 6;
  repeated string symbols = 7;
  repeated string signal_kinds = 8;
  bytes change_id = 9;
}

message StreamOperationsRequest {
  string repo_path = 1;
  // Same shape as QueryOperationsRequest but streamed; server may
  // chunk via a cursor for very large windows.
  QueryOperationsRequest query = 2;
}

// Transactions buffer multiple state-changing operations and apply
// them atomically on commit.
service TransactionService {
  rpc BeginTransaction(BeginTransactionRequest) returns (BeginTransactionResponse);
  rpc CommitTransaction(CommitTransactionRequest) returns (CommitTransactionResponse);
  rpc AbortTransaction(AbortTransactionRequest) returns (AbortTransactionResponse);
  rpc GetTransactionStatus(GetTransactionStatusRequest) returns (TransactionStatus);
}

message BeginTransactionRequest {
  string repo_path = 1;
  string thread = 2;
  string message = 3;
  string client_operation_id = 15;
}

message BeginTransactionResponse {
  string transaction_id = 1;
  google.protobuf.Timestamp started_at = 2;
}

message CommitTransactionRequest {
  string repo_path = 1;
  string transaction_id = 2;
  string client_operation_id = 15;
}

message CommitTransactionResponse {
  bytes state_id = 1;
  uint32 op_count = 2;
}

message AbortTransactionRequest {
  string repo_path = 1;
  string transaction_id = 2;
  string reason = 3;
  string client_operation_id = 15;
}

message AbortTransactionResponse {
  bool aborted = 1;
}

message GetTransactionStatusRequest {
  string repo_path = 1;
  string transaction_id = 2;
}

message TransactionStatus {
  string transaction_id = 1;
  // "active" | "committed" | "aborted"
  string state = 2;
  google.protobuf.Timestamp started_at = 3;
  uint32 buffered_ops = 4;
}

// Programmable hooks. The service manages hook registrations and
// brokers live event delivery: clients subscribe to the
// out-of-process event stream, the server emits events from the
// capture/merge code paths (correlated by `hook_event_id`), and hook
// implementations call back via `RespondToHook` to deliver the hook's
// JSON-encoded reply or veto.
service HookService {
  rpc RegisterHook(RegisterHookRequest) returns (Hook);
  rpc DeregisterHook(DeregisterHookRequest) returns (DeleteResponse);
  rpc ListHooks(ListHooksRequest) returns (ListHooksResponse);
  rpc GetHookEventSchema(GetHookEventSchemaRequest) returns (GetHookEventSchemaResponse);
  // Server-streamed live event delivery. Each event carries an
  // opaque `hook_event_id` correlator that the subscriber echoes
  // back to `RespondToHook`. Read-shaped — no idempotency.
  rpc SubscribeHookEvents(SubscribeHookEventsRequest) returns (stream HookEvent);
  // Deliver the hook's reply (or veto via `abort`) for a previously
  // received event. State-changing — caller supplies
  // `client_operation_id` for retry safety, though the broker will
  // also dedup on `hook_event_id` since each id is single-shot.
  rpc RespondToHook(RespondToHookRequest) returns (RespondToHookResponse);
}

message RegisterHookRequest {
  string repo_path = 1;
  string name = 2;
  string command = 3;
  // Subscribed event names. See `GetHookEventSchema` for the catalog.
  repeated string events = 4;
  uint32 timeout_ms = 5;
  string client_operation_id = 15;
}

message Hook {
  string name = 1;
  string command = 2;
  repeated string events = 3;
  uint32 timeout_ms = 4;
}

message DeregisterHookRequest {
  string repo_path = 1;
  string name = 2;
  string client_operation_id = 15;
}

message ListHooksRequest {
  string repo_path = 1;
}

message ListHooksResponse {
  repeated Hook hooks = 1;
}

message GetHookEventSchemaRequest {
  // Empty returns every registered event's schema.
  string event_name = 1;
}

message GetHookEventSchemaResponse {
  repeated HookEventSchema schemas = 1;
}

message HookEventSchema {
  string event_name = 1;
  uint32 schema_version = 2;
  // JSON-encoded JSON Schema describing the payload.
  string payload_schema_json = 3;
  // JSON-encoded JSON Schema describing the response.
  string response_schema_json = 4;
}

// Live hook event delivery messages. The subscribe RPC
// streams these to every interested hook process; each carries an
// opaque `hook_event_id` correlator so `RespondToHook` can route a
// reply back to the in-flight emitter. Payloads are JSON-encoded
// against the schemas catalogued by `GetHookEventSchema`.

message SubscribeHookEventsRequest {
  string repo_path = 1;
  // Optional event-name filter. Empty = subscribe to every event in
  // the catalog. Same wire shape as `RegisterHookRequest.events`.
  repeated string events = 2;
}

// One emitted hook event:
//   - `hook_event_id` correlates the emit-side waiter with the
//     `RespondToHook` reply.
//   - `event_name` is one of the catalog entries (`pre_capture` etc.).
//   - `payload_json` is the JSON-encoded event payload, validated by
//     the catalog's `payload_schema_json`.
message HookEvent {
  string hook_event_id = 1;
  string event_name = 2;
  string payload_json = 3;
  // Wall-clock emit time. Useful for debugging slow hooks; the
  // emit-side timeout is enforced server-side.
  google.protobuf.Timestamp emitted_at = 4;
}

message RespondToHookRequest {
  string repo_path = 1;
  // Echo from the matching `HookEvent`. Single-shot: re-using an id
  // returns `failed_precondition`.
  string hook_event_id = 2;
  // When non-empty, the operation is aborted with this string as the
  // reason. Universal veto channel — see `HookResponse.abort`.
  string abort = 3;
  // Free-form JSON-encoded extension payload. Decoded into
  // `HookResponse.extra` on the emit-side.
  string extra_signals_json = 4;
  string client_operation_id = 15;
}

message RespondToHookResponse {
  // True when the broker accepted the reply and dispatched it to the
  // waiting emitter. False when the emitter has already timed out or
  // an unrelated reply was already recorded for this id.
  bool accepted = 1;
}

// ── Support access ────────────────────────────────────────────────────────────

message GrantSupportAccessRequest {
  // Heddle staff email — must already exist as a registered user with
  // the `staff` scope marker. The grant is attached to that subject.
  string operator_email = 1;
  // Resource the grant covers. The oneof enforces "exactly one of
  // namespace / repo" at the wire level.
  GrantTargetRef target = 2;
  // TTL in seconds. The audit row's `expires_at` is computed from this
  // at grant time. Hard-capped server-side at 7 days.
  google.protobuf.Duration ttl_seconds = 3;
  // Free-form reason (incident id, ticket link, "fix p0 in deploy
  // pipeline"). Required, non-empty. Surfaced in the audit listing.
  string reason = 4;
  string client_operation_id = 15;
}

message SupportAccessGrant {
  string id = 1;
  string operator_email = 2;
  // Resource the grant covers.
  GrantTargetRef target = 3;
  // The role materialised on the underlying `hosted_grants` row.
  // Always `admin` for support access today; carried as a string so
  // future tiers (read-only support, redacted-data support) can ride
  // the same RPC.
  HostedRole role = 4;
  string granted_by = 5;
  google.protobuf.Timestamp granted_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  // 0 when the grant is still active.
  google.protobuf.Timestamp revoked_at = 8;
  string revoked_by = 9;
  string reason = 10;
}

message ListSupportAccessGrantsRequest {
  // Resource to list grants on. Caller must hold Admin on the named
  // namespace, or on the repo's parent namespace.
  GrantTargetRef target = 1;
  // When true, includes grants whose audit row has been revoked or
  // whose `expires_at` is in the past. Default is active-only.
  bool include_inactive = 2;
}

message ListSupportAccessGrantsResponse {
  repeated SupportAccessGrant grants = 1;
}

message RevokeSupportAccessRequest {
  string id = 1;
  string client_operation_id = 15;
}
