syntax = "proto3";

package heddle.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

service RepoSyncService {
  rpc ListRefs(ListRefsRequest) returns (ListRefsResponse);
  rpc UpdateRef(UpdateRefRequest) returns (UpdateRefResponse);
  rpc Push(stream PushMessage) returns (stream PushMessage);
  rpc Pull(stream PullMessage) returns (stream PullMessage);
}

service HostedUserService {
  rpc GetCurrentUserNamespace(GetCurrentUserNamespaceRequest) returns (HostedNamespace);
  rpc CreateNamespace(CreateNamespaceRequest) returns (HostedNamespace);
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);
  rpc UpdateNamespace(UpdateNamespaceRequest) returns (HostedNamespace);
  rpc DeleteNamespace(DeleteNamespaceRequest) returns (DeleteResponse);
  rpc CreateRepository(CreateRepositoryRequest) returns (HostedRepository);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc UpdateRepository(UpdateRepositoryRequest) returns (HostedRepository);
  rpc DeleteRepository(DeleteRepositoryRequest) returns (DeleteResponse);
  rpc CreateGrant(CreateGrantRequest) returns (HostedGrant);
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse);
  rpc UpdateGrant(UpdateGrantRequest) returns (HostedGrant);
  rpc DeleteGrant(DeleteGrantRequest) returns (DeleteResponse);

  // ── Thread merge approvals ───────────────────────────────────────
  rpc ApproveThread(ApproveThreadRequest) returns (ThreadApproval);
  rpc RevokeApproval(RevokeApprovalRequest) returns (DeleteResponse);
  rpc ListThreadApprovals(ListThreadApprovalsRequest) returns (ListThreadApprovalsResponse);
  rpc CheckMergeEligibility(CheckMergeEligibilityRequest) returns (CheckMergeEligibilityResponse);

  // ── Namespace-scoped invitations and members (formerly admin) ────
  rpc CreateInvitation(CreateInvitationRequest) returns (Invitation);
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse);
  rpc RevokeInvitation(RevokeInvitationRequest) returns (DeleteResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);

  // ── Approval groups (reusable approver pools) ────────────────────
  // Admin role on the repo's parent namespace required to create or
  // mutate; Reader is enough to list.
  rpc CreateApprovalGroup(CreateApprovalGroupRequest) returns (ApprovalGroup);
  rpc ListApprovalGroups(ListApprovalGroupsRequest) returns (ListApprovalGroupsResponse);
  rpc DeleteApprovalGroup(DeleteApprovalGroupRequest) returns (DeleteResponse);
  rpc AddApprovalGroupMember(AddApprovalGroupMemberRequest) returns (ApprovalGroupMember);
  rpc RemoveApprovalGroupMember(RemoveApprovalGroupMemberRequest) returns (DeleteResponse);

  // ── Thread policies (branch protection) ──────────────────────────
  rpc CreateThreadPolicy(CreateThreadPolicyRequest) returns (ThreadPolicy);
  rpc ListThreadPolicies(ListThreadPoliciesRequest) returns (ListThreadPoliciesResponse);
  rpc DeleteThreadPolicy(DeleteThreadPolicyRequest) returns (DeleteResponse);
  rpc AddPolicyGroupRequirement(AddPolicyGroupRequirementRequest) returns (PolicyGroupRequirement);
  rpc RemovePolicyGroupRequirement(RemovePolicyGroupRequirementRequest) returns (DeleteResponse);

  // ── Operator-only listings (gate on staff scope) ─────────────────
  rpc ListActors(ListActorsRequest) returns (ListActorsResponse);
  rpc ListWorktrees(ListWorktreesRequest) returns (ListWorktreesResponse);

  // ── Support access — customer-issued temporary admin grants for
  // Heddle staff. The grantor must hold Admin on the namespace/repo;
  // the grantee is a staff email. The server materialises a real
  // `hosted_grants` row plus a `support_access_audit` row, both
  // bounded by the supplied TTL.
  rpc GrantSupportAccess(GrantSupportAccessRequest) returns (SupportAccessGrant);
  rpc ListSupportAccessGrants(ListSupportAccessGrantsRequest) returns (ListSupportAccessGrantsResponse);
  rpc RevokeSupportAccess(RevokeSupportAccessRequest) returns (DeleteResponse);
}

service AuthService {
  rpc BeginWebAuthnRegistration(BeginWebAuthnRegistrationRequest) returns (AuthChallengeResponse);
  rpc RegisterPublicKey(RegisterPublicKeyRequest) returns (AccessTokenResponse);
  rpc BeginWebAuthnAuthentication(BeginWebAuthnAuthenticationRequest) returns (AuthChallengeResponse);
  rpc FinishWebAuthnAuthentication(FinishWebAuthnAuthenticationRequest) returns (AccessTokenResponse);
  rpc CreateDeviceAuthorization(CreateDeviceAuthorizationRequest) returns (DeviceAuthorizationResponse);
  rpc ApproveDeviceAuthorization(ApproveDeviceAuthorizationRequest) returns (AccessTokenResponse);
  rpc ExchangeDeviceAuthorization(ExchangeDeviceAuthorizationRequest) returns (AccessTokenResponse);
  rpc WaitForDeviceAuthorization(WaitForDeviceAuthorizationRequest) returns (stream DeviceAuthorizationEvent);
  rpc RotateCredential(RotateCredentialRequest) returns (IssuedCredentialResponse);
  rpc RevokeCredential(RevokeCredentialRequest) returns (RevokeCredentialResponse);
  rpc CreateServiceAccount(CreateServiceAccountRequest) returns (ServiceAccountResponse);
  rpc IssueServiceAccountCredential(IssueServiceAccountCredentialRequest) returns (IssuedCredentialResponse);
  rpc RevokeServiceAccount(RevokeServiceAccountRequest) returns (DeleteResponse);
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse);
  rpc IntrospectCredential(IntrospectCredentialRequest) returns (CredentialInfo);
  rpc ListServiceAccounts(ListServiceAccountsRequest) returns (ListServiceAccountsResponse);
  rpc ListScopeCapabilities(ListScopeCapabilitiesRequest) returns (ListScopeCapabilitiesResponse);
  rpc LinkOAuthIdentity(LinkOAuthIdentityRequest) returns (AccessTokenResponse);
  rpc StoreProviderToken(StoreProviderTokenRequest) returns (StoreProviderTokenResponse);
  // Verify the single-use token emailed to a signup address. On success
  // the server marks the signup_email_verification challenge satisfied
  // and returns a bootstrap-scope Biscuit the client presents on the
  // subsequent `BeginWebAuthnRegistration` call. Closes the latent
  // duplicate-username takeover surface named in HeddleCo/weft#120 §1
  // and tracked by HeddleCo/weft#181.
  rpc VerifySignupEmail(VerifySignupEmailRequest) returns (VerifySignupEmailResponse);
  rpc AnalyzeExternalDiff(AnalyzeExternalDiffRequest) returns (AnalyzeExternalDiffResponse);

  // Public lookup of an invitation's shape (namespace path + role) by id.
  // Intentionally exposes no PII (email, invited_by) so the unauth'd
  // `/invite/[id]` page can still show a useful CTA. Returns
  // `exists: false, valid: false` when the id is unknown or malformed.
  rpc GetInvitationSummary(GetInvitationSummaryRequest) returns (InvitationSummary);

  // List the caller's active sessions. Drives the Active Sessions
  // UI (Settings → Active sessions). Surfaces user-agent
  // and IP captured at issue time + last-used timestamp so users
  // can spot unfamiliar devices.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Revoke a single Biscuit session by rev_id. Per-row revoke from
  // the Active Sessions UI; also used by the logout flow on the
  // caller's own session. Pushes the rev_id into `session_blocklist`
  // and broadcasts via Postgres LISTEN/NOTIFY so every server
  // instance's revocation cache rejects the next request.
  rpc RevokeSession(RevokeSessionRequest) returns (DeleteResponse);

  // Mint a fresh Biscuit for a long-lived process (CLI, service
  // account, agent). Unauthenticated at the bearer level: the proof
  // in the request is the authentication. Two proof types are
  // supported. KeypairProof has the caller sign
  // (timestamp, public_key_id, requested_scope) with the Ed25519
  // private key matching a device_roots.public_key or
  // issued_credentials.public_key row; this is the autonomous
  // renewal path used by long-lived CLI processes. DeviceAuthProof
  // completes a user-approved device authorization handoff — the
  // CLI presents the device_code returned by
  // CreateDeviceAuthorization plus a signature over device:{code}.
  // The requested_scope field is an attenuation hint: the server
  // clamps it down to what the keypair owner was originally granted
  // — never up.
  rpc MintBiscuit(MintBiscuitRequest) returns (AccessTokenResponse);

  // Issue a short-lived presence-scoped Biscuit derived from the
  // caller's existing session bearer. The returned token is the
  // caller's parent token with an attenuation block that pins
  // `operation == "presence"` and a 5-minute hard expiry. Used by
  // the web app's presence WebSocket flow so the browser never has
  // to expose its long-lived `heddle_session` bearer to client JS:
  // the SvelteKit server-side reads the HttpOnly cookie, calls this
  // RPC, and returns the narrow token to the browser, which embeds
  // it in the WS upgrade URL. If the narrow token leaks (XSS, log
  // capture) it can only subscribe to presence and only for 5
  // minutes — and revoking the parent session kills it via cascade
  // rev-id rejection.
  rpc IssuePresenceToken(IssuePresenceTokenRequest) returns (IssuePresenceTokenResponse);

  // Mint a fresh anonymous Biscuit for a browser that has no
  // session cookie yet. Unauthenticated — the response IS the
  // identity. The returned biscuit carries `subject_kind("anon")`
  // and a fresh `Anon(uuid)` subject; tapestry base64-encodes the
  // bytes and emits `Set-Cookie: weft_auth=<…>; HttpOnly; Secure;
  // SameSite=Lax`. Subsequent calls from the same browser ride on
  // this biscuit as a normal bearer; later sign-in is an
  // anon→user promotion (mint a new user-subject biscuit, revoke
  // the anon rev_id). Per-IP rate-limited; when
  // `WEFT_MINT_TURNSTILE_REQUIRED=true`, requires a valid
  // Turnstile token. See HeddleCo/weft#189 and
  // `docs/auth/anon-biscuit-spike.md` §3 + §7.1.
  rpc MintAnonBiscuit(MintAnonBiscuitRequest) returns (MintAnonBiscuitResponse);
}

service ContentService {
  rpc GetRefs(GetRefsRequest) returns (GetRefsResponse);
  rpc ListStates(ListStatesRequest) returns (ListStatesResponse);
  rpc GetState(GetStateRequest) returns (StateSummary);
  rpc GetBlame(GetBlameRequest) returns (GetBlameResponse);
  rpc ListProvenanceSummaries(ListProvenanceSummariesRequest) returns (ListProvenanceSummariesResponse);
  rpc GetTree(GetTreeRequest) returns (TreeResponse);
  rpc GetBlob(GetBlobRequest) returns (BlobResponse);
  rpc GetCompare(GetCompareRequest) returns (CompareResponse);
  rpc GetDiff(GetStateRequest) returns (DiffResponse);
  // Walk recent history and aggregate semantic-change events to surface
  // the files or functions with the most activity.
  rpc GetSemanticHotSpots(GetSemanticHotSpotsRequest) returns (GetSemanticHotSpotsResponse);
  rpc ListActions(GetStateRequest) returns (ActionsResponse);
  rpc ListContext(ListContextRequest) returns (ListContextResponse);
  rpc GetContextHistory(GetContextHistoryRequest) returns (GetContextHistoryResponse);
  rpc ListContextSuggestions(ListContextSuggestionsRequest) returns (ListContextSuggestionsResponse);
  rpc SetContext(SetContextRequest) returns (SetContextResponse);
  rpc ReviseContext(ReviseContextRequest) returns (ReviseContextResponse);
  rpc SupersedeContext(SupersedeContextRequest) returns (SupersedeContextResponse);
}

service RepoEventService {
  rpc SubscribeRepoEvents(SubscribeRepoEventsRequest) returns (stream RepoEvent);
}

service ThreadWorkflowService {
  rpc StartThread(StartThreadRequest) returns (ThreadSummary);
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
  rpc GetWorkspaceSummary(GetWorkspaceSummaryRequest) returns (WorkspaceSummary);
  rpc StreamWorkspaceSummary(GetWorkspaceSummaryRequest) returns (stream WorkspaceSummary);
  rpc GetThread(GetThreadRequest) returns (ThreadSummary);
  rpc CaptureThread(CaptureThreadRequest) returns (CaptureThreadResponse);
  rpc CompleteThread(CompleteThreadRequest) returns (ThreadSummary);
  rpc WatchThreads(WatchThreadsRequest) returns (stream ThreadEvent);
}

service ReviewService {
  rpc StartReviewAnalysis(StartReviewAnalysisRequest) returns (StartReviewAnalysisResponse);
  rpc GetReviewAnalysisStatus(GetReviewAnalysisStatusRequest) returns (GetReviewAnalysisStatusResponse);
  rpc GetReviewAnalysisResult(GetReviewAnalysisResultRequest) returns (GetReviewAnalysisResultResponse);
}

message RefEntry {
  string name = 1;
  bytes change_id = 2;
  bool is_thread = 3;
}

message ListRefsRequest {
  string repo_path = 1;
}

message ListRefsResponse {
  string head_thread = 1;
  bytes head_state = 2;
  repeated RefEntry refs = 3;
}

message UpdateRefRequest {
  string repo_path = 1;
  string name = 2;
  bool is_thread = 3;
  bool force = 4;
  string old_value = 5;
  string new_value = 6;
  ThreadMetadata thread_metadata = 7;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message UpdateRefResponse {
  bool success = 1;
  string old_value = 2;
  string error = 3;
}

enum TransportMode {
  TRANSPORT_MODE_UNSPECIFIED = 0;
  // Native pack is the steady-state sync transport for hosted repo pull/push.
  TRANSPORT_MODE_NATIVE_PACK = 1;
}

enum ObjectAvailabilityStatus {
  OBJECT_AVAILABILITY_STATUS_UNSPECIFIED = 0;
  OBJECT_AVAILABILITY_STATUS_PRESENT = 1;
  OBJECT_AVAILABILITY_STATUS_MISSING = 2;
  OBJECT_AVAILABILITY_STATUS_RESUMABLE = 3;
  OBJECT_AVAILABILITY_STATUS_LAZY = 4;
}

enum PartialFetchStatus {
  PARTIAL_FETCH_STATUS_UNSPECIFIED = 0;
  PARTIAL_FETCH_STATUS_DISABLED = 1;
  PARTIAL_FETCH_STATUS_ENABLED = 2;
  PARTIAL_FETCH_STATUS_REQUIRED = 3;
}

message TransferCheckpoint {
  string transfer_id = 1;
  TransportMode transport_mode = 2;
  uint64 resume_offset = 3;
  uint32 chunk_index = 4;
  bytes checkpoint = 5;
  bool is_complete = 6;
}

message ObjectDescriptor {
  string id = 1;
  string object_type = 2;
  ObjectAvailabilityStatus availability_status = 3;
  string availability_note = 4;
}

message PushRequest {
  string repo_path = 1;
  string local_state = 2;
  string target_thread = 3;
  bool create_thread = 4;
  bool force = 5;
  repeated ObjectDescriptor objects = 6;
  TransferCheckpoint transfer = 7;
  PartialFetchStatus partial_fetch_status = 8;
  bool allow_partial_fetch = 9;
  ThreadMetadata thread_metadata = 10;
  // Idempotency on the stream-opening message. The PushMessage
  // envelope itself isn't the operation — PushRequest is.
  string client_operation_id = 15;
}

message PushReady {
  string remote_head = 1;
  repeated ObjectDescriptor have_objects = 2;
  repeated ObjectDescriptor want_objects = 3;
  TransferCheckpoint transfer = 4;
  PartialFetchStatus partial_fetch_status = 5;
  repeated ObjectDescriptor missing_objects = 6;
}

// Legacy object-by-object chunking is no longer used for normal repo sync.
// The schema stays here only for narrow, non-steady-state object transfer paths.
message ObjectChunk {
  string id = 1;
  string object_type = 2;
  bytes data = 3;
  bool is_delta = 4;
  TransferCheckpoint transfer = 5;
  uint32 chunk_length = 6;
  bool is_final_chunk = 7;
}

enum PackStreamKind {
  PACK_STREAM_KIND_UNSPECIFIED = 0;
  PACK_STREAM_KIND_PACK = 1;
  PACK_STREAM_KIND_INDEX = 2;
}

message PackChunk {
  PackStreamKind stream_kind = 1;
  bytes data = 2;
  TransferCheckpoint transfer = 3;
  uint32 chunk_length = 4;
  bool is_final_chunk = 5;
}

message PushComplete {
  bool success = 1;
  string new_state = 2;
  string error = 3;
  TransferCheckpoint transfer = 4;
}

// Out-of-pack transport for redaction sidecars. Sidecars live
// structurally outside `.heddle/objects/` (so GC can't reach them)
// and therefore can't ride the native-pack object channel. The
// sender emits one `RedactionTransfer` per blob hash with an active
// redaction in the state closure; the receiver routes through
// `Repository::accept_wire_redactions` for signature + trust-list
// verification.
//
// `blob_hash` is the hex-encoded ContentHash of the *redacted blob*
// (the redactions store is keyed by that hash, not by the
// redaction-record content hash).
// `redactions_blob` is the rmp-encoded `RedactionsBlob` byte payload
// — byte-identical to what `Repository::put_redaction` wrote on the
// sender's disk.
message RedactionTransfer {
  string blob_hash = 1;
  bytes redactions_blob = 2;
}

// Out-of-pack transport for state-visibility sidecars. State visibility
// records live outside `.heddle/objects/` and are keyed by the state id
// whose audience tier they declare.
//
// `state_id` is the hex-encoded ChangeId of the state.
// `state_visibility_blob` is the rmp-encoded `StateVisibilityBlob` byte
// payload.
message StateVisibilityTransfer {
  string state_id = 1;
  bytes state_visibility_blob = 2;
}

message PushMessage {
  oneof body {
    PushRequest request = 1;
    PushReady ready = 2;
    PackChunk pack = 3;
    PushComplete complete = 4;
    RedactionTransfer redaction = 5;
    StateVisibilityTransfer state_visibility = 6;
  }
}

message PullRequest {
  string repo_path = 1;
  string remote_thread = 2;
  string local_thread = 3;
  string target_state = 4;
  uint32 depth = 5;
  repeated string exclude_states = 6;
  TransferCheckpoint transfer = 7;
  PartialFetchStatus partial_fetch_status = 8;
  bool allow_partial_fetch = 9;
  bool fresh_full_pull = 10;
  // Idempotency on the stream-opening message. The PullMessage
  // envelope itself isn't the operation — PullRequest is.
  string client_operation_id = 15;
}

message PullReady {
  string remote_state = 1;
  repeated ObjectDescriptor objects_to_fetch = 2;
  TransferCheckpoint transfer = 3;
  PartialFetchStatus partial_fetch_status = 4;
  repeated ObjectDescriptor missing_objects = 5;
  bool full_closure_available = 6;
  uint32 object_count = 7;
}

message WantObjects {
  repeated ObjectDescriptor objects = 1;
  TransferCheckpoint transfer = 2;
  bool want_full_closure = 3;
}

message PullComplete {
  bool success = 1;
  string new_state = 2;
  string error = 3;
  TransferCheckpoint transfer = 4;
}

message PullMessage {
  oneof body {
    PullRequest request = 1;
    PullReady ready = 2;
    WantObjects want = 3;
    PackChunk pack = 4;
    PullComplete complete = 5;
    RedactionTransfer redaction = 6;
    StateVisibilityTransfer state_visibility = 7;
  }
}

// Namespace kinds in the hosted control plane. `USER` namespaces are
// per-account and auto-created at first sign-in; `ORG` and `TEAM` are
// explicit organisational containers.
enum NamespaceKind {
  NAMESPACE_KIND_UNSPECIFIED = 0;
  NAMESPACE_KIND_USER = 1;
  NAMESPACE_KIND_ORG = 2;
  NAMESPACE_KIND_TEAM = 3;
}

// Five-level role grants on hosted namespaces and repositories. Used
// wherever a role appears on the wire — `HostedGrant.role`,
// `Invitation.role`, `ApprovalGroupMember.required_role`,
// `ThreadPolicy.required_role`, etc.
enum HostedRole {
  HOSTED_ROLE_UNSPECIFIED = 0;
  HOSTED_ROLE_READER = 1;
  HOSTED_ROLE_DEVELOPER = 2;
  HOSTED_ROLE_MAINTAINER = 3;
  HOSTED_ROLE_ADMIN = 4;
  HOSTED_ROLE_OWNER = 5;
}

// Review-signature kinds. `READ` is a human reviewer; the agent variants
// distinguish what an AI signing a state was actually doing — preview
// (passive read-through) vs co-review (mutating suggestions).
enum ReviewKind {
  REVIEW_KIND_UNSPECIFIED = 0;
  REVIEW_KIND_READ = 1;
  REVIEW_KIND_AGENT_PREVIEW = 2;
  REVIEW_KIND_AGENT_CO_REVIEW = 3;
}

// State publication status. Captures whether a state is in-progress
// (`DRAFT`) or pinned as the published shape of the work (`PUBLISHED`).
enum StateStatus {
  STATE_STATUS_UNSPECIFIED = 0;
  STATE_STATUS_DRAFT = 1;
  STATE_STATUS_PUBLISHED = 2;
}

message ListNamespacesRequest {}
message GetCurrentUserNamespaceRequest {}
message CreateNamespaceRequest {
  NamespaceKind kind = 1;
  string slug = 2;
  string parent_path = 3;
  string display_name = 4;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message UpdateNamespaceRequest {
  string full_path = 1;
  string new_slug = 2;
  string display_name = 3;
  bool clear_display_name = 4;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message DeleteNamespaceRequest {
  string full_path = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message ListRepositoriesRequest {
  string namespace_path = 1;
}
message CreateRepositoryRequest {
  string namespace_path = 1;
  string slug = 2;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message UpdateRepositoryRequest {
  string full_path = 1;
  string new_slug = 2;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message DeleteRepositoryRequest {
  string full_path = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message ListGrantsRequest {
  string resource = 1;
}

// Grants are scoped to either a namespace or a repository — never both,
// never neither. The `target` oneof is the wire-level form of that
// "exactly one of" guarantee. Server-side `classify_grant_target`
// translates it to a `GrantTarget` enum without runtime branching.
message GrantTargetRef {
  oneof target {
    string namespace_path = 1;
    string repo_path = 2;
  }
}
message CreateGrantRequest {
  string subject = 1;
  HostedRole role = 2;
  GrantTargetRef target = 3;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message UpdateGrantRequest {
  string subject = 1;
  HostedRole role = 2;
  GrantTargetRef target = 3;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message DeleteGrantRequest {
  string subject = 1;
  GrantTargetRef target = 2;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}
message DeleteResponse {
  bool deleted = 1;
}
message ListActorsRequest {}
message ListWorktreesRequest {}
message HostedNamespace {
  string namespace_id = 1;
  NamespaceKind kind = 2;
  string slug = 3;
  string full_path = 4;
  string parent_id = 5;
  string display_name = 6;
}
message HostedRepository {
  string repo_id = 1;
  string namespace_id = 2;
  string slug = 3;
  string path = 4;
  string full_path = 5;
}
message HostedGrant {
  string subject = 1;
  HostedRole role = 2;
  GrantTargetRef target = 3;
}
message ActorSummary {
  string session_id = 1;
  string thread = 2;
  optional string path = 3;
  bytes base_state = 4;
  google.protobuf.Timestamp started_at = 5;
  optional string provider = 6;
  optional string model = 7;
  string status = 8;
  optional string heddle_session_id = 9;
  optional string harness = 10;
  optional string thinking_level = 11;
  UsageSummary usage_summary = 12;
  optional google.protobuf.Timestamp last_progress_at = 13;
  optional string report_flush_state = 14;
  optional string client_instance_id = 15;
  optional string attach_reason = 16;
  optional string native_actor_key = 17;
  optional string native_parent_actor_key = 18;
  optional string probe_source = 19;
  optional float probe_confidence = 20;
}
message WorktreeSummary {
  string id = 1;
  string name = 2;
  bytes base_state = 3;
  optional string thread = 4;
  uint32 changes = 5;
  optional string session_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp modified_at = 8;
  bool is_current = 9;
}
message ListActorsResponse {
  repeated ActorSummary actors = 1;
}
message ListWorktreesResponse {
  repeated WorktreeSummary worktrees = 1;
}

// --- Invitations (Track D) -------------------------------------------------

message Invitation {
  string id = 1;
  string email = 2;
  string namespace_path = 3;
  HostedRole role = 4;
  string invited_by = 5;
  google.protobuf.Timestamp created_at = 6; // unix seconds
  google.protobuf.Timestamp expires_at = 7; // 0 if no expiry
  google.protobuf.Timestamp accepted_at = 8; // 0 if pending
  string accepted_by = 9; // "" if pending
  string metadata = 10; // stringified JSON — small, avoids pulling in struct
}

message CreateInvitationRequest {
  string email = 1;
  string namespace_path = 2;
  HostedRole role = 3;
  google.protobuf.Timestamp expires_at = 4; // 0 = no expiry
  string metadata = 5; // optional caller-supplied JSON; pass "{}" if none

  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

message ListInvitationsRequest {
  string namespace_path = 1;
  bool include_accepted = 2; // default false = pending only
}

message ListInvitationsResponse {
  repeated Invitation invitations = 1;
}

message RevokeInvitationRequest {
  string id = 1;
  // Idempotency (audit-idempotency enforces tag 15).
  string client_operation_id = 15;
}

// Members = direct grants + pending invitations for a namespace.
message MemberEntry {
  // Exactly one of these is populated.
  oneof entry {
    Grant grant = 1;
    Invitation invitation = 2;
  }
  message Grant {
    string subject = 1;
    HostedRole role = 2;
    string resource_path = 3;
    string resource_kind = 4; // "namespace" or "repository"
  }
}

message ListMembersRequest {
  string namespace_path = 1;
  bool include_descendants = 2; // include grants on child namespaces + repos
}

message ListMembersResponse {
  repeated MemberEntry entries = 1;
}

message StartReviewAnalysisRequest {
  string provider = 1;
  string owner = 2;
  string repo = 3;
  uint32 pr_number = 4;
  bool force_refresh = 5;
}

message StartReviewAnalysisResponse {
  string job_id = 1;
  string head_sha = 2;
}

enum ReviewJobStatus {
  REVIEW_JOB_STATUS_UNSPECIFIED = 0;
  REVIEW_JOB_STATUS_PENDING = 1;
  REVIEW_JOB_STATUS_ANALYZING = 2;
  REVIEW_JOB_STATUS_POSTED = 3;
  REVIEW_JOB_STATUS_FAILED = 4;
}

enum ReviewJobPhase {
  REVIEW_JOB_PHASE_UNSPECIFIED = 0;
  REVIEW_JOB_PHASE_FETCH = 1;
  REVIEW_JOB_PHASE_HIGHLIGHT = 2;
  REVIEW_JOB_PHASE_FINALIZE = 3;
  REVIEW_JOB_PHASE_COMPLETE = 4;
  REVIEW_JOB_PHASE_FAILED = 5;
}

message GetReviewAnalysisStatusRequest {
  string job_id = 1;
  string provider = 2;
  string owner = 3;
  string repo = 4;
  uint32 pr_number = 5;
}

message GetReviewAnalysisStatusResponse {
  string job_id = 1;
