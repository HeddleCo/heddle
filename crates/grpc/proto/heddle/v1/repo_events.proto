syntax = "proto3";

package heddle.v1;

import "heddle/v1/options.proto";

import "google/protobuf/timestamp.proto";

service RepoEventService {
  rpc SubscribeRepoEvents(SubscribeRepoEventsRequest) returns (stream RepoEvent) {
    option (heddle.v1.rpc_contract) = { effect: RPC_EFFECT_READ_ONLY deduplication: RPC_DEDUPLICATION_NONE };
  }
}

message SubscribeRepoEventsRequest {
  string repo_id = 1;
  string thread = 2;
  int64 after_event_id = 3;
  repeated string event_types = 4;
}

message RepoEvent {
  int64 event_id = 1;
  string repo_id = 2;
  string event_type = 3;
  string thread = 4;
  string ref_name = 5;
  bool is_thread = 6;
  string old_state = 7;
  string new_state = 8;
  string actor_subject = 9;
  string payload_json = 10;
  google.protobuf.Timestamp created_at = 11;
  // Visible path of repo_id, for multi-repo client routing.
  string repo_path = 12;
}
